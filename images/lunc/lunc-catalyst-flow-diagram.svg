<svg width="1600" height="430" viewBox="0 0 1600 430" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Terra Classic catalyst flow</title>
  <desc id="desc">Editorial retro-futurist flow diagram explaining the LUNC rally through burns, staking, zero inflation, and sentiment repricing.</desc>
  <defs>
    <filter id="grain" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="2" stitchTiles="stitch" result="noise"/>
      <feColorMatrix in="noise" type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.05"/>
      </feComponentTransfer>
    </filter>
    <filter id="logoShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="2" stdDeviation="2.2" flood-color="#2D2430" flood-opacity="0.45"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0 0L12 6L0 12V0Z" fill="#2D2430"/>
    </marker>
  </defs>
  <rect width="1600" height="430" fill="#F1E6CF"/>
  <rect width="1600" height="430" fill="#F1E6CF" filter="url(#grain)"/>

  <rect x="56" y="44" width="1488" height="330" fill="#F6EEDB"/>
  <rect x="74" y="62" width="1488" height="330" fill="#2D2430"/>
  <rect x="56" y="44" width="1488" height="330" fill="#F6EEDB" stroke="#2D2430" stroke-width="3"/>

  <text x="98" y="104" fill="#2D2430" font-family="Georgia, 'Times New Roman', serif" font-size="36" font-weight="700">LUNC Repricing Flow</text>
  <text x="98" y="138" fill="#7D3A3E" font-family="Arial, Helvetica, sans-serif" font-size="18">
    <tspan x="98" dy="0">The move only makes sense when legacy supply mechanics</tspan>
    <tspan x="98" dy="24">and revived risk appetite are read together.</tspan>
  </text>

  <rect x="98" y="190" width="200" height="104" fill="#E7A0A4"/>
  <rect x="114" y="206" width="200" height="104" fill="#B3472F"/>
  <rect x="98" y="190" width="200" height="104" fill="#F7E9D7" stroke="#2D2430" stroke-width="3"/>
  <text x="198" y="228" text-anchor="middle" fill="#8C2F39" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="700">BURNS</text>
  <text x="198" y="260" text-anchor="middle" fill="#2D2430" font-family="Arial, Helvetica, sans-serif" font-size="15">444.18B removed</text>

  <rect x="352" y="190" width="200" height="104" fill="#D98858"/>
  <rect x="368" y="206" width="200" height="104" fill="#6B2B30"/>
  <rect x="352" y="190" width="200" height="104" fill="#F7E9D7" stroke="#2D2430" stroke-width="3"/>
  <text x="452" y="228" text-anchor="middle" fill="#8C2F39" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="700">STAKING</text>
  <text x="452" y="260" text-anchor="middle" fill="#2D2430" font-family="Arial, Helvetica, sans-serif" font-size="15">932.78B bonded</text>

  <rect x="606" y="190" width="200" height="104" fill="#E7A0A4"/>
  <rect x="622" y="206" width="200" height="104" fill="#B3472F"/>
  <rect x="606" y="190" width="200" height="104" fill="#F7E9D7" stroke="#2D2430" stroke-width="3"/>
  <text x="706" y="228" text-anchor="middle" fill="#8C2F39" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="700">ZERO MINT</text>
  <text x="706" y="260" text-anchor="middle" fill="#2D2430" font-family="Arial, Helvetica, sans-serif" font-size="15">Inflation currently 0</text>

  <rect x="860" y="190" width="224" height="104" fill="#D98858"/>
  <rect x="876" y="206" width="224" height="104" fill="#6B2B30"/>
  <rect x="860" y="190" width="224" height="104" fill="#F7E9D7" stroke="#2D2430" stroke-width="3"/>
  <text x="972" y="228" text-anchor="middle" fill="#8C2F39" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="700">SENTIMENT RETURNS</text>
  <text x="972" y="260" text-anchor="middle" fill="#2D2430" font-family="Arial, Helvetica, sans-serif" font-size="15">Old high-beta names reprice</text>

  <rect x="1138" y="190" width="304" height="104" fill="#E7A0A4"/>
  <rect x="1154" y="206" width="304" height="104" fill="#B3472F"/>
  <rect x="1138" y="190" width="304" height="104" fill="#F7E9D7" stroke="#2D2430" stroke-width="3"/>
  <text x="1290" y="228" text-anchor="middle" fill="#8C2F39" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="700">FLOAT REPRICING</text>
  <text x="1290" y="260" text-anchor="middle" fill="#2D2430" font-family="Arial, Helvetica, sans-serif" font-size="15">Tighter visible float pushes the rally</text>

  <line x1="298" y1="242" x2="352" y2="242" stroke="#2D2430" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="552" y1="242" x2="606" y2="242" stroke="#2D2430" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="806" y1="242" x2="860" y2="242" stroke="#2D2430" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="1084" y1="242" x2="1138" y2="242" stroke="#2D2430" stroke-width="4" marker-end="url(#arrow)"/>
  <rect x="690" y="318" width="220" height="40" rx="20" fill="#2D2430"/>
  <image filter="url(#logoShadow)" href="data:image/png;base64," x="730" y="321" width="140" height="32" preserveAspectRatio="xMidYMid meet"/>
</svg>
