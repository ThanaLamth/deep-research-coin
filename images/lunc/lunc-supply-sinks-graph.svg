<svg width="1400" height="820" viewBox="0 0 1400 820" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">LUNC supply sinks graph</title>
  <desc id="desc">A graph comparing Terra Classic starting supply, current supply, burned supply, bonded staking, and the current total-minus-circulating gap.</desc>
  <rect width="1400" height="820" rx="28" fill="#F5F1E8"/>
  <text x="70" y="74" fill="#1E293B" font-family="Georgia, 'Times New Roman', serif" font-size="34" font-weight="700">LUNC Supply Sinks</text>
  <text x="70" y="108" fill="#475569" font-family="Arial, Helvetica, sans-serif" font-size="18">Why the current float looks tighter than the headline supply suggests</text>

  <rect x="70" y="150" width="1260" height="120" rx="22" fill="#FFFFFF"/>
  <text x="98" y="194" fill="#1E293B" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700">What this graph proves</text>
  <text x="98" y="232" fill="#334155" font-family="Arial, Helvetica, sans-serif" font-size="18">Burns have clearly reduced Terra Classic supply since the post-crash peak, but the current float story depends even more on staking. Bonded supply almost entirely explains the current gap between total and circulating LUNC.</text>

  <text x="98" y="334" fill="#334155" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="700">Start supply</text>
  <rect x="98" y="348" width="1120" height="44" rx="16" fill="#CBD5E1"/>
  <text x="1240" y="376" text-anchor="end" fill="#475569" font-family="Arial, Helvetica, sans-serif" font-size="16">6.907T LUNC</text>

  <text x="98" y="444" fill="#334155" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="700">Current total supply</text>
  <rect x="98" y="458" width="1049" height="44" rx="16" fill="#1D4ED8"/>
  <text x="1240" y="486" text-anchor="end" fill="#475569" font-family="Arial, Helvetica, sans-serif" font-size="16">6.463T LUNC, about 93.6% of the start level</text>

  <text x="98" y="554" fill="#334155" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="700">Burned to date</text>
  <rect x="98" y="568" width="72" height="44" rx="16" fill="#B91C1C"/>
  <text x="1240" y="596" text-anchor="end" fill="#475569" font-family="Arial, Helvetica, sans-serif" font-size="16">444.18B LUNC, about 6.4% of the start supply</text>

  <text x="98" y="664" fill="#334155" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="700">Bonded staking</text>
  <rect x="98" y="678" width="162" height="44" rx="16" fill="#166534"/>
  <text x="1240" y="706" text-anchor="end" fill="#475569" font-family="Arial, Helvetica, sans-serif" font-size="16">932.78B LUNC, about 14.4% of current total supply</text>

  <text x="70" y="790" fill="#64748B" font-family="Arial, Helvetica, sans-serif" font-size="15">Sources used for this graph: CoinMarketCap, LuncScan, Terra Classic public-node data. Metrics checked on April 28, 2026.</text>
</svg>
