<svg width="1400" height="820" viewBox="0 0 1400 820" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Terra Classic supply sinks graph</title>
  <desc id="desc">Editorial print-style graph showing how burns and bonded staking tighten the visible LUNC float.</desc>
  <defs>
    <filter id="grain" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="2" stitchTiles="stitch" result="noise"/>
      <feColorMatrix in="noise" type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.05"/>
      </feComponentTransfer>
    </filter>
  </defs>
  <rect width="1400" height="820" fill="#F1E6CF"/>
  <rect width="1400" height="820" fill="#F1E6CF" filter="url(#grain)"/>

  <rect x="74" y="60" width="1252" height="700" fill="#F6EEDB"/>
  <rect x="92" y="78" width="1252" height="700" fill="#2D2430"/>
  <rect x="74" y="60" width="1252" height="700" fill="#F6EEDB" stroke="#2D2430" stroke-width="3"/>

  <text x="116" y="132" fill="#2D2430" font-family="Georgia, 'Times New Roman', serif" font-size="38" font-weight="700">LUNC Supply Sinks</text>
  <text x="116" y="168" fill="#7D3A3E" font-family="Arial, Helvetica, sans-serif" font-size="18">
    <tspan x="116" dy="0">This is the structure behind the rally: total supply is huge,</tspan>
    <tspan x="116" dy="24">but burns and staking compress what matters now.</tspan>
  </text>

  <rect x="116" y="230" width="1168" height="112" fill="#E7A0A4"/>
  <rect x="134" y="248" width="1168" height="112" fill="#B3472F"/>
  <rect x="116" y="230" width="1168" height="112" fill="#F7E9D7" stroke="#2D2430" stroke-width="3"/>
  <text x="148" y="276" fill="#2D2430" font-family="Arial, Helvetica, sans-serif" font-size="21" font-weight="700">START SUPPLY</text>
  <text x="148" y="314" fill="#2D2430" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700">6.907T LUNC</text>

  <rect x="116" y="390" width="1094" height="112" fill="#D98858"/>
  <rect x="134" y="408" width="1094" height="112" fill="#6B2B30"/>
  <rect x="116" y="390" width="1094" height="112" fill="#F7E9D7" stroke="#2D2430" stroke-width="3"/>
  <text x="148" y="436" fill="#2D2430" font-family="Arial, Helvetica, sans-serif" font-size="21" font-weight="700">CURRENT TOTAL SUPPLY</text>
  <text x="148" y="474" fill="#2D2430" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700">6.463T LUNC</text>

  <rect x="116" y="550" width="76" height="112" fill="#E7A0A4"/>
  <rect x="134" y="568" width="76" height="112" fill="#B3472F"/>
  <rect x="116" y="550" width="76" height="112" fill="#F7E9D7" stroke="#2D2430" stroke-width="3"/>
  <text x="228" y="594" fill="#2D2430" font-family="Arial, Helvetica, sans-serif" font-size="21" font-weight="700">BURNED TO DATE</text>
  <text x="228" y="632" fill="#2D2430" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700">444.18B LUNC</text>
  <text x="228" y="664" fill="#7D3A3E" font-family="Arial, Helvetica, sans-serif" font-size="17">About 6.4% of the original post-crash supply.</text>

  <rect x="778" y="550" width="160" height="112" fill="#D98858"/>
  <rect x="796" y="568" width="160" height="112" fill="#6B2B30"/>
  <rect x="778" y="550" width="160" height="112" fill="#F7E9D7" stroke="#2D2430" stroke-width="3"/>
  <text x="974" y="594" fill="#2D2430" font-family="Arial, Helvetica, sans-serif" font-size="21" font-weight="700">BONDED STAKING</text>
  <text x="974" y="632" fill="#2D2430" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700">932.78B LUNC</text>
  <text x="974" y="664" fill="#7D3A3E" font-family="Arial, Helvetica, sans-serif" font-size="17">
    <tspan x="974" dy="0">Almost all of the non-circulating</tspan>
    <tspan x="974" dy="22">supply gap is explained here.</tspan>
  </text>
  <rect x="590" y="706" width="220" height="40" rx="20" fill="#2D2430"/>
  <image href="https://coincu.com/wp-content/uploads/2025/03/CCNews_white.png" x="648" y="715" width="104" height="22" preserveAspectRatio="xMidYMid meet"/>
</svg>
