  <text x="1122" y="153" fill="#8C2F39" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="700">PROJECT</text>
  <text x="1122" y="180" fill="#2D2430" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="700">Terra Classic</text>
  <text x="1122" y="205" fill="#2D2430" font-family="Arial, Helvetica, sans-serif" font-size="15">Token: LUNC</text>

  <rect x="114" y="214" width="356" height="192" fill="#E7A0A4"/>
  <rect x="132" y="232" width="356" height="192" fill="#B3472F"/>
  <rect x="114" y="214" width="356" height="192" fill="#F7E9D7" stroke="#2D2430" stroke-width="3"/>
  <text x="142" y="254" fill="#8C2F39" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">WHAT IT IS</text>
  <text x="142" y="296" fill="#2D2430" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">
    <tspan x="142" dy="0">The original Terra</tspan>
    <tspan x="142" dy="28">chain still alive</tspan>
  </text>
  <text x="142" y="348" fill="#2D2430" font-family="Arial, Helvetica, sans-serif" font-size="16">
    <tspan x="142" dy="0">LUNC belongs to Terra Classic, the</tspan>
    <tspan x="142" dy="21">community-run network that stayed live</tspan>
    <tspan x="142" dy="21">after the 2022 collapse.</tspan>
  </text>

  <rect x="522" y="214" width="356" height="192" fill="#D98858"/>
  <rect x="540" y="232" width="356" height="192" fill="#6B2B30"/>
  <rect x="522" y="214" width="356" height="192" fill="#F7E9D7" stroke="#2D2430" stroke-width="3"/>
  <text x="550" y="254" fill="#8C2F39" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">WHAT MAKES IT DIFFERENT</text>
  <text x="550" y="296" fill="#2D2430" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700">
    <tspan x="550" dy="0">Burns + staking +</tspan>
    <tspan x="550" dy="26">zero mint inflation</tspan>
  </text>
  <text x="550" y="344" fill="#2D2430" font-family="Arial, Helvetica, sans-serif" font-size="16">
    <tspan x="550" dy="0">The story is no longer growth-chain</tspan>
    <tspan x="550" dy="21">expansion. It is supply discipline and</tspan>
    <tspan x="550" dy="21">float compression that traders can model.</tspan>
  </text>

  <rect x="930" y="214" width="356" height="192" fill="#E7A0A4"/>
  <rect x="948" y="232" width="356" height="192" fill="#B3472F"/>
  <rect x="930" y="214" width="356" height="192" fill="#F7E9D7" stroke="#2D2430" stroke-width="3"/>
  <text x="958" y="254" fill="#8C2F39" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">WHY IT STILL MATTERS</text>
  <text x="958" y="296" fill="#2D2430" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700">
    <tspan x="958" dy="0">Legacy brand with</tspan>
    <tspan x="958" dy="26">tradable structure</tspan>
  </text>
  <text x="958" y="344" fill="#2D2430" font-family="Arial, Helvetica, sans-serif" font-size="16">
    <tspan x="958" dy="0">The Terra name still pulls attention,</tspan>
    <tspan x="958" dy="20">while validators and governance keep</tspan>
    <tspan x="958" dy="20">the chain liquid enough to keep trading.</tspan>
  </text>

  <rect x="114" y="462" width="1172" height="256" fill="#D98858"/>
  <rect x="134" y="482" width="1172" height="256" fill="#6B2B30"/>
  <rect x="114" y="462" width="1172" height="256" fill="#F7E9D7" stroke="#2D2430" stroke-width="3"/>
  <text x="148" y="506" fill="#2D2430" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700">AT A GLANCE</text>
  <text x="148" y="554" fill="#2D2430" font-family="Arial, Helvetica, sans-serif" font-size="19">1. Project: community-run legacy Layer 1, not a new launch narrative.</text>
  <text x="148" y="592" fill="#2D2430" font-family="Arial, Helvetica, sans-serif" font-size="19">2. Token identity: LUNC on Terra Classic, separate from Terra 2.0's LUNA.</text>
  <text x="148" y="630" fill="#2D2430" font-family="Arial, Helvetica, sans-serif" font-size="19">3. Differentiator: burns, bonded staking, and zero mint inflation shape the float.</text>
  <text x="148" y="668" fill="#2D2430" font-family="Arial, Helvetica, sans-serif" font-size="19">4. Why traders care: cleaner supply structure than the headline token count suggests.</text>
  <text x="148" y="700" fill="#7D3A3E" font-family="Arial, Helvetica, sans-serif" font-size="17">
    <tspan x="148" dy="0">This is the visual shorthand: what Terra Classic is, why it still trades, and what makes the setup distinct.</tspan>
  </text>
  <rect x="590" y="756" width="220" height="40" rx="20" fill="#2D2430"/>
  <text x="114" y="792" fill="#7D3A3E" font-family="Arial, Helvetica, sans-serif" font-size="16">Legacy chain framed around burns, staking, and survival.</text>
  <image filter="url(#logoShadow)" href="data:image/png;base64," x="630" y="758" width="140" height="32" preserveAspectRatio="xMidYMid meet"/>
</svg>
