<svg width="1400" height="880" viewBox="0 0 1400 880" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Terra Classic project capture</title>
  <desc id="desc">Editorial-style project snapshot for Terra Classic showing the modern LUNC thesis in a print-inspired institutional visual language.</desc>
  <defs>
    <filter id="grain" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="2" stitchTiles="stitch" result="noise"/>
      <feColorMatrix in="noise" type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.05"/>
      </feComponentTransfer>
    </filter>
    <filter id="logoShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="2" stdDeviation="2.2" flood-color="#2D2430" flood-opacity="0.45"/>
    </filter>
  </defs>
  <rect width="1400" height="880" fill="#F1E6CF"/>
  <rect width="1400" height="880" fill="#F1E6CF" filter="url(#grain)"/>

  <rect x="72" y="62" width="1254" height="756" fill="#F6EEDB"/>
  <rect x="90" y="80" width="1254" height="756" fill="#2D2430"/>
  <rect x="72" y="62" width="1254" height="756" fill="#F6EEDB" stroke="#2D2430" stroke-width="3"/>

  <text x="114" y="124" fill="#8C2F39" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700" letter-spacing="2">PROJECT OVERVIEW</text>
  <text x="114" y="166" fill="#2D2430" font-family="Georgia, 'Times New Roman', serif" font-size="40" font-weight="700">Terra Classic</text>
  <text x="114" y="201" fill="#7D3A3E" font-family="Arial, Helvetica, sans-serif" font-size="18">The original Terra chain still trading under LUNC, now driven by burns, staking, and supply discipline.</text>

  <rect x="1008" y="110" width="278" height="120" fill="#D98858"/>
  <rect x="1024" y="126" width="278" height="120" fill="#6B2B30"/>
  <rect x="1008" y="110" width="278" height="120" fill="#F7E9D7" stroke="#2D2430" stroke-width="3"/>
