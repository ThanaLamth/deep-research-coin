<svg width="1400" height="920" viewBox="0 0 1400 920" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Terra Classic market capture</title>
  <desc id="desc">Editorial-style market snapshot for Terra Classic with high-contrast print-inspired blocks, directional shadows, and a limited investigative palette.</desc>
  <defs>
    <filter id="grain" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch" result="noise"/>
      <feColorMatrix in="noise" type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.05"/>
      </feComponentTransfer>
    </filter>
  </defs>
  <rect width="1400" height="920" fill="#F1E6CF"/>
  <rect width="1400" height="920" fill="#F1E6CF" filter="url(#grain)"/>

  <rect x="74" y="68" width="1252" height="784" fill="#F6EEDB"/>
  <rect x="92" y="86" width="1252" height="784" fill="#2D2430"/>
  <rect x="74" y="68" width="1252" height="784" fill="#F6EEDB" stroke="#2D2430" stroke-width="3"/>

  <text x="116" y="136" fill="#2D2430" font-family="Georgia, 'Times New Roman', serif" font-size="38" font-weight="700">Terra Classic Market Snapshot</text>
  <text x="116" y="172" fill="#7D3A3E" font-family="Arial, Helvetica, sans-serif" font-size="18">
    <tspan x="116" dy="0">April 28, 2026 • LUNC is breaking out,</tspan>
    <tspan x="116" dy="24">but the move still sits inside a legacy-asset structure.</tspan>
  </text>

  <rect x="116" y="216" width="260" height="150" fill="#E7A0A4"/>
  <rect x="132" y="232" width="260" height="150" fill="#B3472F"/>
  <rect x="116" y="216" width="260" height="150" fill="#F7E9D7" stroke="#2D2430" stroke-width="3"/>
  <text x="142" y="258" fill="#8C2F39" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">PRICE</text>
  <text x="142" y="314" fill="#2D2430" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700">$0.00006957</text>
  <text x="142" y="342" fill="#8C2F39" font-family="Arial, Helvetica, sans-serif" font-size="16">24h: +8.12%</text>

  <rect x="420" y="216" width="260" height="150" fill="#D98858"/>
  <rect x="436" y="232" width="260" height="150" fill="#6B2B30"/>
  <rect x="420" y="216" width="260" height="150" fill="#F7E9D7" stroke="#2D2430" stroke-width="3"/>
  <text x="446" y="258" fill="#8C2F39" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">MARKET CAP</text>
  <text x="446" y="314" fill="#2D2430" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700">$383.16M</text>
  <text x="446" y="342" fill="#8C2F39" font-family="Arial, Helvetica, sans-serif" font-size="16">CMC rank: 96</text>

  <rect x="724" y="216" width="260" height="150" fill="#E7A0A4"/>
  <rect x="740" y="232" width="260" height="150" fill="#B3472F"/>
  <rect x="724" y="216" width="260" height="150" fill="#F7E9D7" stroke="#2D2430" stroke-width="3"/>
  <text x="750" y="258" fill="#8C2F39" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">24H VOLUME</text>
  <text x="750" y="314" fill="#2D2430" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700">$131.42M</text>
  <text x="750" y="342" fill="#8C2F39" font-family="Arial, Helvetica, sans-serif" font-size="16">About 34% of market cap</text>

  <rect x="1028" y="216" width="260" height="150" fill="#D98858"/>
  <rect x="1044" y="232" width="260" height="150" fill="#6B2B30"/>
  <rect x="1028" y="216" width="260" height="150" fill="#F7E9D7" stroke="#2D2430" stroke-width="3"/>
  <text x="1054" y="258" fill="#8C2F39" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">FDV</text>
  <text x="1054" y="314" fill="#2D2430" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700">$449.66M</text>
  <text x="1054" y="342" fill="#8C2F39" font-family="Arial, Helvetica, sans-serif" font-size="16">Close enough to matter</text>

  <rect x="116" y="426" width="548" height="174" fill="#E7A0A4"/>
  <rect x="134" y="444" width="548" height="174" fill="#6B2B30"/>
  <rect x="116" y="426" width="548" height="174" fill="#F7E9D7" stroke="#2D2430" stroke-width="3"/>
  <text x="148" y="466" fill="#8C2F39" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">MOMENTUM</text>
  <text x="148" y="512" fill="#2D2430" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">7d: +64.43%</text>
  <text x="148" y="548" fill="#2D2430" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">30d: +91.75%</text>
  <text x="148" y="582" fill="#7D3A3E" font-family="Arial, Helvetica, sans-serif" font-size="17">
    <tspan x="148" dy="0">Price is pressing the top</tspan>
    <tspan x="148" dy="22">of the 7-day and 30-day range.</tspan>
  </text>

  <rect x="708" y="426" width="580" height="174" fill="#D98858"/>
  <rect x="726" y="444" width="580" height="174" fill="#8C2F39"/>
  <rect x="708" y="426" width="580" height="174" fill="#F7E9D7" stroke="#2D2430" stroke-width="3"/>
  <text x="740" y="466" fill="#8C2F39" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">SUPPLY</text>
  <text x="740" y="512" fill="#2D2430" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">Circulating: 5.507T LUNC</text>
  <text x="740" y="548" fill="#2D2430" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">Total: 6.463T LUNC</text>
  <text x="740" y="582" fill="#7D3A3E" font-family="Arial, Helvetica, sans-serif" font-size="17">
    <tspan x="740" dy="0">That gap is where the real float story starts,</tspan>
    <tspan x="740" dy="22">not where it ends.</tspan>
  </text>

  <rect x="116" y="654" width="1172" height="142" fill="#E7A0A4"/>
  <rect x="136" y="674" width="1172" height="142" fill="#B3472F"/>
  <rect x="116" y="654" width="1172" height="142" fill="#F7E9D7" stroke="#2D2430" stroke-width="3"/>
  <text x="148" y="694" fill="#2D2430" font-family="Arial, Helvetica, sans-serif" font-size="21" font-weight="700">EDITORIAL READ</text>
  <text x="148" y="726" fill="#2D2430" font-family="Arial, Helvetica, sans-serif" font-size="18">
    <tspan x="148" dy="0">LUNC is not moving like a random dead-chain bounce. It is trading as a still-liquid</tspan>
    <tspan x="148" dy="24">legacy asset whose supply story looks cleaner when staking, burns,</tspan>
    <tspan x="148" dy="24">and zero inflation are viewed together.</tspan>
  </text>
  <text x="148" y="786" fill="#7D3A3E" font-family="Arial, Helvetica, sans-serif" font-size="16">Source base: CoinMarketCap, LuncScan, Terra Classic public-node data.</text>
  <rect x="590" y="812" width="220" height="40" rx="20" fill="#2D2430"/>
  <image href="data:image/png;base64," x="648" y="821" width="104" height="22" preserveAspectRatio="xMidYMid meet"/>
</svg>
