<svg width="1400" height="920" viewBox="0 0 1400 920" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">LUNC market snapshot capture</title>
  <desc id="desc">A visual summary of Terra Classic market metrics on April 28, 2026, including price, market cap, volume, supply, and breakout ranges.</desc>
  <rect width="1400" height="920" rx="28" fill="#F5F1E8"/>
  <text x="70" y="74" fill="#1E293B" font-family="Georgia, 'Times New Roman', serif" font-size="34" font-weight="700">Terra Classic Market Snapshot</text>
  <text x="70" y="108" fill="#475569" font-family="Arial, Helvetica, sans-serif" font-size="18">Point-in-time market metrics used in the April 28, 2026 why-pumping review</text>

  <rect x="70" y="150" width="300" height="130" rx="22" fill="#FFF7ED"/>
  <text x="98" y="194" fill="#9A3412" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">Price</text>
  <text x="98" y="242" fill="#9A3412" font-family="Arial, Helvetica, sans-serif" font-size="36" font-weight="700">$0.00006957</text>
  <text x="98" y="268" fill="#9A3412" font-family="Arial, Helvetica, sans-serif" font-size="16">24h change: +8.12%</text>

  <rect x="390" y="150" width="300" height="130" rx="22" fill="#ECFDF5"/>
  <text x="418" y="194" fill="#166534" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">Market Cap</text>
  <text x="418" y="242" fill="#166534" font-family="Arial, Helvetica, sans-serif" font-size="36" font-weight="700">$383.16M</text>
  <text x="418" y="268" fill="#166534" font-family="Arial, Helvetica, sans-serif" font-size="16">Rank: 96 on CoinMarketCap</text>

  <rect x="710" y="150" width="300" height="130" rx="22" fill="#EFF6FF"/>
  <text x="738" y="194" fill="#1D4ED8" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">24h Volume</text>
  <text x="738" y="242" fill="#1D4ED8" font-family="Arial, Helvetica, sans-serif" font-size="36" font-weight="700">$131.42M</text>
  <text x="738" y="268" fill="#1D4ED8" font-family="Arial, Helvetica, sans-serif" font-size="16">About 34% of market cap</text>

  <rect x="1030" y="150" width="300" height="130" rx="22" fill="#FEF2F2"/>
  <text x="1058" y="194" fill="#B91C1C" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">FDV</text>
  <text x="1058" y="242" fill="#B91C1C" font-family="Arial, Helvetica, sans-serif" font-size="36" font-weight="700">$449.66M</text>
  <text x="1058" y="268" fill="#B91C1C" font-family="Arial, Helvetica, sans-serif" font-size="16">Not far above market cap</text>

  <rect x="70" y="320" width="400" height="190" rx="22" fill="#FFFBEB"/>
  <text x="98" y="362" fill="#92400E" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">Momentum</text>
  <text x="98" y="402" fill="#92400E" font-family="Arial, Helvetica, sans-serif" font-size="18">7d: +64.43%</text>
  <text x="98" y="436" fill="#92400E" font-family="Arial, Helvetica, sans-serif" font-size="18">30d: +91.75%</text>
  <text x="98" y="470" fill="#92400E" font-family="Arial, Helvetica, sans-serif" font-size="18">7d low/high: $0.00004220 / $0.00007180</text>

  <rect x="500" y="320" width="400" height="190" rx="22" fill="#F0FDF4"/>
  <text x="528" y="362" fill="#166534" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">Supply</text>
  <text x="528" y="402" fill="#166534" font-family="Arial, Helvetica, sans-serif" font-size="18">Circulating: 5.507T LUNC</text>
  <text x="528" y="436" fill="#166534" font-family="Arial, Helvetica, sans-serif" font-size="18">Total: 6.463T LUNC</text>
  <text x="528" y="470" fill="#166534" font-family="Arial, Helvetica, sans-serif" font-size="18">Float story matters more than ticker nostalgia</text>

  <rect x="930" y="320" width="400" height="190" rx="22" fill="#EEF2FF"/>
  <text x="958" y="362" fill="#4338CA" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">Volatility</text>
  <text x="958" y="402" fill="#4338CA" font-family="Arial, Helvetica, sans-serif" font-size="18">24h low/high: $0.00005738 / $0.00007180</text>
  <text x="958" y="436" fill="#4338CA" font-family="Arial, Helvetica, sans-serif" font-size="18">30d low/high: $0.00003535 / $0.00007180</text>
  <text x="958" y="470" fill="#4338CA" font-family="Arial, Helvetica, sans-serif" font-size="18">The current breakout sits at the top of the 30d range</text>

  <rect x="70" y="570" width="1260" height="250" rx="26" fill="#FFFFFF"/>
  <text x="98" y="614" fill="#1E293B" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700">Why these numbers matter</text>
  <text x="98" y="656" fill="#334155" font-family="Arial, Helvetica, sans-serif" font-size="18">LUNC is not moving like a dead chart waking up for one random session. It is trading at the top of its recent range with strong 7-day and 30-day momentum.</text>
  <text x="98" y="692" fill="#334155" font-family="Arial, Helvetica, sans-serif" font-size="18">That does not prove a full fundamentals comeback, but it does show that traders are willing to reprice a still-liquid, still-volatile legacy token when the supply story looks cleaner.</text>
  <text x="98" y="728" fill="#334155" font-family="Arial, Helvetica, sans-serif" font-size="18">The most important tension is simple: the total supply is still huge, yet the amount that appears truly free to move is tighter than the headline figure suggests.</text>

  <text x="70" y="874" fill="#64748B" font-family="Arial, Helvetica, sans-serif" font-size="15">Sources used for this capture: CoinMarketCap, LuncScan, Terra Classic public-node data. Metrics checked on April 28, 2026.</text>
</svg>
