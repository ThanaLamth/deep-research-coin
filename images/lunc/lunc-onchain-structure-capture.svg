<svg width="1400" height="980" viewBox="0 0 1400 980" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">LUNC onchain structure capture</title>
  <desc id="desc">A visual summary of Terra Classic burned supply, bonded staking, zero inflation, and recent block activity on April 28, 2026.</desc>
  <rect width="1400" height="980" rx="28" fill="#F5F1E8"/>
  <text x="70" y="74" fill="#1E293B" font-family="Georgia, 'Times New Roman', serif" font-size="34" font-weight="700">LUNC Onchain Structure</text>
  <text x="70" y="108" fill="#475569" font-family="Arial, Helvetica, sans-serif" font-size="18">Supply, staking, inflation, and point-in-time block activity from Terra Classic public data</text>

  <rect x="70" y="150" width="420" height="260" rx="22" fill="#FFF7ED"/>
  <text x="98" y="192" fill="#9A3412" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700">Supply structure</text>
  <text x="98" y="236" fill="#9A3412" font-family="Arial, Helvetica, sans-serif" font-size="18">Total supply: 6.463T LUNC</text>
  <text x="98" y="268" fill="#9A3412" font-family="Arial, Helvetica, sans-serif" font-size="18">Circulating: 5.507T LUNC</text>
  <text x="98" y="300" fill="#9A3412" font-family="Arial, Helvetica, sans-serif" font-size="18">Gap: 955.9B LUNC</text>
  <text x="98" y="332" fill="#9A3412" font-family="Arial, Helvetica, sans-serif" font-size="18">Burned to date: 444.18B LUNC</text>
  <text x="98" y="364" fill="#9A3412" font-family="Arial, Helvetica, sans-serif" font-size="18">Average burn/day: 306.97M LUNC</text>

  <rect x="520" y="150" width="380" height="260" rx="22" fill="#ECFDF5"/>
  <text x="548" y="192" fill="#166534" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700">Bonded staking</text>
  <text x="548" y="236" fill="#166534" font-family="Arial, Helvetica, sans-serif" font-size="18">Bonded: 932.78B LUNC</text>
  <text x="548" y="268" fill="#166534" font-family="Arial, Helvetica, sans-serif" font-size="18">14.43% of total supply</text>
  <text x="548" y="300" fill="#166534" font-family="Arial, Helvetica, sans-serif" font-size="18">16.94% of circulating supply</text>
  <text x="548" y="332" fill="#166534" font-family="Arial, Helvetica, sans-serif" font-size="18">97.6% of the non-circulating gap</text>
  <text x="548" y="364" fill="#166534" font-family="Arial, Helvetica, sans-serif" font-size="18">Unbonding time: 21 days</text>

  <rect x="930" y="150" width="400" height="260" rx="22" fill="#EFF6FF"/>
  <text x="958" y="192" fill="#1D4ED8" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700">Mint side</text>
  <text x="958" y="236" fill="#1D4ED8" font-family="Arial, Helvetica, sans-serif" font-size="18">Inflation: 0</text>
  <text x="958" y="268" fill="#1D4ED8" font-family="Arial, Helvetica, sans-serif" font-size="18">Annual provisions: 0</text>
  <text x="958" y="300" fill="#1D4ED8" font-family="Arial, Helvetica, sans-serif" font-size="18">Burn pressure is not visibly offset by mint issuance.</text>

  <rect x="70" y="460" width="1260" height="300" rx="22" fill="#FFFFFF"/>
  <text x="98" y="504" fill="#1E293B" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700">Recent block activity sample</text>
  <text x="98" y="548" fill="#334155" font-family="Arial, Helvetica, sans-serif" font-size="18">Sample used: the most recent 60 Terra Classic blocks around 03:19 UTC on April 28, 2026.</text>
  <text x="98" y="582" fill="#334155" font-family="Arial, Helvetica, sans-serif" font-size="18">Average transactions per block: 19.78</text>
  <text x="98" y="616" fill="#334155" font-family="Arial, Helvetica, sans-serif" font-size="18">Median transactions per block: 2.5</text>
  <text x="98" y="650" fill="#334155" font-family="Arial, Helvetica, sans-serif" font-size="18">Blocks with at least one transaction: 53 of 60</text>
  <text x="98" y="684" fill="#334155" font-family="Arial, Helvetica, sans-serif" font-size="18">Maximum transactions in one sampled block: 92</text>
  <text x="98" y="718" fill="#334155" font-family="Arial, Helvetica, sans-serif" font-size="18">Read: activity exists, but the median block still looks thin. The move appears to be led more by supply and sentiment than by a broad demand breakout.</text>

  <rect x="70" y="800" width="1260" height="110" rx="22" fill="#FEF3C7"/>
  <text x="98" y="846" fill="#92400E" font-family="Arial, Helvetica, sans-serif" font-size="18">Key read: LUNC does have real onchain support for a tighter-float narrative. Burns are large, bonded staking is larger, and inflation is currently zero. What it does not yet have is equally clear evidence of a full usage-driven comeback.</text>

  <text x="70" y="948" fill="#64748B" font-family="Arial, Helvetica, sans-serif" font-size="15">Sources used for this capture: LuncScan, Terra Classic public nodes, Terra Classic LCD data. Metrics checked on April 28, 2026.</text>
</svg>
