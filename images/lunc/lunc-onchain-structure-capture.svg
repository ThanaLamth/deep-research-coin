<svg width="1400" height="980" viewBox="0 0 1400 980" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Terra Classic onchain structure capture</title>
  <desc id="desc">Editorial-style onchain summary for Terra Classic highlighting burns, bonded staking, zero inflation, and restrained chain activity.</desc>
  <defs>
    <filter id="grain" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" stitchTiles="stitch" result="noise"/>
      <feColorMatrix in="noise" type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.05"/>
      </feComponentTransfer>
    </filter>
    <filter id="logoShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="2" stdDeviation="2.2" flood-color="#2D2430" flood-opacity="0.45"/>
    </filter>
  </defs>
  <rect width="1400" height="980" fill="#F1E6CF"/>
  <rect width="1400" height="980" fill="#F1E6CF" filter="url(#grain)"/>

  <rect x="70" y="60" width="1260" height="850" fill="#F6EEDB"/>
  <rect x="88" y="78" width="1260" height="850" fill="#2D2430"/>
  <rect x="70" y="60" width="1260" height="850" fill="#F6EEDB" stroke="#2D2430" stroke-width="3"/>

  <text x="112" y="132" fill="#2D2430" font-family="Georgia, 'Times New Roman', serif" font-size="38" font-weight="700">LUNC Onchain Structure</text>
  <text x="112" y="168" fill="#7D3A3E" font-family="Arial, Helvetica, sans-serif" font-size="18">
    <tspan x="112" dy="0">The real story is not just that burns exist.</tspan>
    <tspan x="112" dy="24">It is how burns, staking, and zero inflation interact inside the same supply map.</tspan>
  </text>

  <rect x="112" y="216" width="356" height="204" fill="#E7A0A4"/>
  <rect x="130" y="234" width="356" height="204" fill="#B3472F"/>
  <rect x="112" y="216" width="356" height="204" fill="#F7E9D7" stroke="#2D2430" stroke-width="3"/>
  <text x="140" y="256" fill="#8C2F39" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">BURNS</text>
  <text x="140" y="304" fill="#2D2430" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700">444.18B LUNC removed</text>
  <text x="140" y="342" fill="#2D2430" font-family="Arial, Helvetica, sans-serif" font-size="18">6.43% of total supply is gone.</text>
  <text x="140" y="374" fill="#2D2430" font-family="Arial, Helvetica, sans-serif" font-size="18">Average burn/day: 306.97M LUNC.</text>

  <rect x="522" y="216" width="356" height="204" fill="#D98858"/>
  <rect x="540" y="234" width="356" height="204" fill="#6B2B30"/>
  <rect x="522" y="216" width="356" height="204" fill="#F7E9D7" stroke="#2D2430" stroke-width="3"/>
  <text x="550" y="256" fill="#8C2F39" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">BONDED STAKING</text>
  <text x="550" y="304" fill="#2D2430" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700">932.78B LUNC bonded</text>
  <text x="550" y="342" fill="#2D2430" font-family="Arial, Helvetica, sans-serif" font-size="18">14.43% of total supply.</text>
  <text x="550" y="374" fill="#2D2430" font-family="Arial, Helvetica, sans-serif" font-size="18">97.6% of the non-circulating gap.</text>

  <rect x="932" y="216" width="356" height="204" fill="#E7A0A4"/>
  <rect x="950" y="234" width="356" height="204" fill="#B3472F"/>
  <rect x="932" y="216" width="356" height="204" fill="#F7E9D7" stroke="#2D2430" stroke-width="3"/>
  <text x="960" y="256" fill="#8C2F39" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">MINT SIDE</text>
  <text x="960" y="304" fill="#2D2430" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700">Inflation: 0</text>
  <text x="960" y="342" fill="#2D2430" font-family="Arial, Helvetica, sans-serif" font-size="18">Annual provisions: 0.</text>
  <text x="960" y="374" fill="#2D2430" font-family="Arial, Helvetica, sans-serif" font-size="18">
    <tspan x="960" dy="0">No visible mint offset</tspan>
    <tspan x="960" dy="24">to the burn narrative.</tspan>
  </text>

  <rect x="112" y="474" width="1176" height="250" fill="#D98858"/>
  <rect x="132" y="494" width="1176" height="250" fill="#8C2F39"/>
  <rect x="112" y="474" width="1176" height="250" fill="#F7E9D7" stroke="#2D2430" stroke-width="3"/>
  <text x="144" y="518" fill="#2D2430" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700">BLOCK ACTIVITY SAMPLE</text>
  <text x="144" y="566" fill="#2D2430" font-family="Arial, Helvetica, sans-serif" font-size="19">Latest 60 blocks checked around 03:19 UTC, April 28.</text>
  <text x="144" y="604" fill="#2D2430" font-family="Arial, Helvetica, sans-serif" font-size="19">Average transactions per block: 19.78</text>
  <text x="144" y="642" fill="#2D2430" font-family="Arial, Helvetica, sans-serif" font-size="19">Median transactions per block: 2.5</text>
  <text x="144" y="680" fill="#2D2430" font-family="Arial, Helvetica, sans-serif" font-size="19">
    <tspan x="144" dy="0">Interpretation: chain activity exists,</tspan>
    <tspan x="144" dy="24">but the median block still looks thin.</tspan>
  </text>

  <rect x="112" y="770" width="1176" height="96" fill="#E7A0A4"/>
  <rect x="128" y="786" width="1176" height="96" fill="#B3472F"/>
  <rect x="112" y="770" width="1176" height="96" fill="#F7E9D7" stroke="#2D2430" stroke-width="3"/>
  <text x="144" y="824" fill="#2D2430" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700">INVESTIGATIVE READ</text>
  <text x="360" y="816" fill="#2D2430" font-family="Arial, Helvetica, sans-serif" font-size="18">
    <tspan x="360" dy="0">LUNC has enough onchain evidence for a tighter-float thesis,</tspan>
    <tspan x="360" dy="24">but not yet enough usage evidence for a full fundamentals-led comeback.</tspan>
  </text>
  <rect x="590" y="882" width="220" height="40" rx="20" fill="#2D2430"/>
  <image filter="url(#logoShadow)" href="data:image/png;base64," x="630" y="884" width="140" height="32" preserveAspectRatio="xMidYMid meet"/>
</svg>
