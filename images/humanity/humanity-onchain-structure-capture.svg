<svg width="1400" height="980" viewBox="0 0 1400 980" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Humanity onchain structure capture</title>
  <desc id="desc">Editorial-style onchain summary for Humanity Protocol showing usage metrics, public pool thinness, and the gap between visible DEX flow and broader market turnover.</desc>
  <defs>
    <filter id="grain" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" stitchTiles="stitch" result="noise"/>
      <feColorMatrix in="noise" type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.05"/>
      </feComponentTransfer>
    </filter>
  </defs>
  <rect width="1400" height="980" fill="#F1E6CF"/>
  <rect width="1400" height="980" fill="#F1E6CF" filter="url(#grain)"/>

  <rect x="70" y="60" width="1260" height="850" fill="#F6EEDB"/>
  <rect x="88" y="78" width="1260" height="850" fill="#2D2430"/>
  <rect x="70" y="60" width="1260" height="850" fill="#F6EEDB" stroke="#2D2430" stroke-width="3"/>

  <text x="112" y="132" fill="#2D2430" font-family="Georgia, 'Times New Roman', serif" font-size="38" font-weight="700">H Onchain Structure</text>
  <text x="112" y="168" fill="#7D3A3E" font-family="Arial, Helvetica, sans-serif" font-size="18">
    <tspan x="112" dy="0">The cleanest onchain story is not a whale map.</tspan>
    <tspan x="112" dy="24">It is the tension between real usage signals and a still-thin visible public float.</tspan>
  </text>

  <rect x="112" y="216" width="356" height="204" fill="#E7A0A4"/>
  <rect x="130" y="234" width="356" height="204" fill="#B3472F"/>
  <rect x="112" y="216" width="356" height="204" fill="#F7E9D7" stroke="#2D2430" stroke-width="3"/>
  <text x="140" y="256" fill="#8C2F39" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">USAGE FOOTPRINT</text>
  <text x="140" y="304" fill="#2D2430" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700">476,121 verified users</text>
  <text x="140" y="342" fill="#2D2430" font-family="Arial, Helvetica, sans-serif" font-size="18">8.95M total users on explorer.</text>
  <text x="140" y="374" fill="#2D2430" font-family="Arial, Helvetica, sans-serif" font-size="18">9.30M credentials issued.</text>

  <rect x="522" y="216" width="356" height="204" fill="#D98858"/>
  <rect x="540" y="234" width="356" height="204" fill="#6B2B30"/>
  <rect x="522" y="216" width="356" height="204" fill="#F7E9D7" stroke="#2D2430" stroke-width="3"/>
  <text x="550" y="256" fill="#8C2F39" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">VISIBLE DEX FLOAT</text>
  <text x="550" y="304" fill="#2D2430" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700">2.2819M H in pools</text>
  <text x="550" y="342" fill="#2D2430" font-family="Arial, Helvetica, sans-serif" font-size="18">0.084% of circulating supply.</text>
  <text x="550" y="374" fill="#2D2430" font-family="Arial, Helvetica, sans-serif" font-size="18">0.023% of max supply.</text>

  <rect x="932" y="216" width="356" height="204" fill="#E7A0A4"/>
  <rect x="950" y="234" width="356" height="204" fill="#B3472F"/>
  <rect x="932" y="216" width="356" height="204" fill="#F7E9D7" stroke="#2D2430" stroke-width="3"/>
  <text x="960" y="256" fill="#8C2F39" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">FLOW GAP</text>
  <text x="960" y="304" fill="#2D2430" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700">DEX 24h: $7.81K</text>
  <text x="960" y="342" fill="#2D2430" font-family="Arial, Helvetica, sans-serif" font-size="18">CMC 24h: $76.96M.</text>
  <text x="960" y="374" fill="#2D2430" font-family="Arial, Helvetica, sans-serif" font-size="18">Visible DEX share: 0.010%.</text>

  <rect x="112" y="474" width="1176" height="250" fill="#D98858"/>
  <rect x="132" y="494" width="1176" height="250" fill="#8C2F39"/>
  <rect x="112" y="474" width="1176" height="250" fill="#F7E9D7" stroke="#2D2430" stroke-width="3"/>
  <text x="144" y="518" fill="#2D2430" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700">INVESTIGATIVE READ</text>
  <text x="144" y="566" fill="#2D2430" font-family="Arial, Helvetica, sans-serif" font-size="19">The explorer metrics show that Humanity is not launching into a blank activity slate.</text>
  <text x="144" y="604" fill="#2D2430" font-family="Arial, Helvetica, sans-serif" font-size="19">The public Ethereum-side pools show the opposite side of the story: visible depth is still tiny.</text>
  <text x="144" y="642" fill="#2D2430" font-family="Arial, Helvetica, sans-serif" font-size="19">
    <tspan x="144" dy="0">That combination explains the current move well.</tspan>
    <tspan x="144" dy="24">The project is active enough to attract attention, but the public float is still narrow enough to let repricing turn violent.</tspan>
  </text>

  <rect x="112" y="770" width="1176" height="96" fill="#E7A0A4"/>
  <rect x="128" y="786" width="1176" height="96" fill="#B3472F"/>
  <rect x="112" y="770" width="1176" height="96" fill="#F7E9D7" stroke="#2D2430" stroke-width="3"/>
  <text x="144" y="824" fill="#2D2430" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700">BOTTOM LINE</text>
  <text x="360" y="816" fill="#2D2430" font-family="Arial, Helvetica, sans-serif" font-size="18">
    <tspan x="360" dy="0">The best-supported thesis is access-and-float repricing,</tspan>
    <tspan x="360" dy="24">not a public DEX-led accumulation story.</tspan>
  </text>
</svg>
