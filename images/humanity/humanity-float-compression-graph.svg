<svg width="1400" height="760" viewBox="0 0 1400 760" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Humanity float compression graph</title>
  <desc id="desc">A supply comparison chart for Humanity Protocol showing max supply, circulating supply, and visible public Ethereum-side pool inventory.</desc>
  <rect width="1400" height="760" rx="28" fill="#F5F1E8"/>
  <text x="70" y="74" fill="#1E293B" font-family="Georgia, 'Times New Roman', serif" font-size="34" font-weight="700">Visible Float Compression</text>
  <text x="70" y="110" fill="#475569" font-family="Arial, Helvetica, sans-serif" font-size="18">The visible public Ethereum-side H inventory is tiny next to both max and circulating supply</text>

  <text x="120" y="210" fill="#374151" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">Max Supply</text>
  <rect x="300" y="180" width="940" height="44" rx="22" fill="#E5E7EB"/>
  <rect x="300" y="180" width="940" height="44" rx="22" fill="#B91C1C"/>
  <text x="1260" y="208" text-anchor="end" fill="#7F1D1D" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">10.0B H</text>

  <text x="120" y="330" fill="#374151" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">Circulating Supply</text>
  <rect x="300" y="300" width="940" height="44" rx="22" fill="#E5E7EB"/>
  <rect x="300" y="300" width="256" height="44" rx="22" fill="#2563EB"/>
  <text x="1260" y="328" text-anchor="end" fill="#1E3A8A" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">2.7268B H or 27.27% of max</text>

  <text x="120" y="450" fill="#374151" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">Visible Public DEX H</text>
  <rect x="300" y="420" width="940" height="44" rx="22" fill="#E5E7EB"/>
  <rect x="300" y="420" width="8" height="44" rx="4" fill="#16A34A"/>
  <text x="1260" y="448" text-anchor="end" fill="#14532D" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">2.2819M H or 0.023% of max</text>

  <rect x="90" y="544" width="1220" height="146" rx="22" fill="#FFFFFF"/>
  <text x="122" y="586" fill="#1E293B" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700">How to read this chart</text>
  <text x="122" y="626" fill="#334155" font-family="Arial, Helvetica, sans-serif" font-size="18">
    <tspan x="122" dy="0">The chart does not claim that only 2.2819 million H can trade. Centralized exchanges obviously hold additional inventory.</tspan>
    <tspan x="122" dy="28">What it shows is narrower and still important: the public Ethereum-side H inventory visible in the reviewed pools is extremely small relative to the token’s headline supply base.</tspan>
    <tspan x="122" dy="28">That is why the public market can look liquid enough to trade while still being too thin to absorb aggressive demand smoothly.</tspan>
  </text>

  <text x="70" y="726" fill="#64748B" font-family="Arial, Helvetica, sans-serif" font-size="15">Supply comparison built from CoinMarketCap circulating and max supply plus DexScreener visible pool inventory checks on April 29, 2026.</text>
</svg>
