<svg width="1400" height="820" viewBox="0 0 1400 820" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Humanity float compression graph</title>
  <desc id="desc">Editorial-style supply comparison showing how small the visible public Ethereum-side H inventory is relative to both max and circulating supply.</desc>
  <defs>
    <filter id="grain" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" stitchTiles="stitch" result="noise"/>
      <feColorMatrix in="noise" type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.05"/>
      </feComponentTransfer>
    </filter>
  </defs>
  <rect width="1400" height="820" fill="#F1E6CF"/>
  <rect width="1400" height="820" fill="#F1E6CF" filter="url(#grain)"/>

  <rect x="70" y="60" width="1260" height="700" fill="#F6EEDB"/>
  <rect x="88" y="78" width="1260" height="700" fill="#2D2430"/>
  <rect x="70" y="60" width="1260" height="700" fill="#F6EEDB" stroke="#2D2430" stroke-width="3"/>

  <text x="112" y="132" fill="#2D2430" font-family="Georgia, 'Times New Roman', serif" font-size="38" font-weight="700">Visible Float Compression</text>
  <text x="112" y="168" fill="#7D3A3E" font-family="Arial, Helvetica, sans-serif" font-size="18">
    <tspan x="112" dy="0">The chart is not saying only 2.2819M H can trade.</tspan>
    <tspan x="112" dy="24">It is showing how small the visible public Ethereum-side inventory still is.</tspan>
  </text>

  <text x="128" y="278" fill="#8C2F39" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">MAX SUPPLY</text>
  <rect x="320" y="244" width="900" height="64" fill="#E7A0A4"/>
  <rect x="338" y="262" width="900" height="64" fill="#B3472F"/>
  <rect x="320" y="244" width="900" height="64" fill="#F7E9D7" stroke="#2D2430" stroke-width="3"/>
  <rect x="320" y="244" width="900" height="64" fill="#B3472F"/>
  <text x="1248" y="286" text-anchor="end" fill="#2D2430" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">10.0B H</text>

  <text x="128" y="408" fill="#8C2F39" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">CIRCULATING</text>
  <rect x="320" y="374" width="900" height="64" fill="#D98858"/>
  <rect x="338" y="392" width="900" height="64" fill="#6B2B30"/>
  <rect x="320" y="374" width="900" height="64" fill="#F7E9D7" stroke="#2D2430" stroke-width="3"/>
  <rect x="320" y="374" width="245" height="64" fill="#6B2B30"/>
  <text x="1248" y="416" text-anchor="end" fill="#2D2430" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">2.7268B H or 27.27% of max</text>

  <text x="128" y="538" fill="#8C2F39" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">VISIBLE PUBLIC DEX H</text>
  <rect x="320" y="504" width="900" height="64" fill="#E7A0A4"/>
  <rect x="338" y="522" width="900" height="64" fill="#B3472F"/>
  <rect x="320" y="504" width="900" height="64" fill="#F7E9D7" stroke="#2D2430" stroke-width="3"/>
  <rect x="320" y="504" width="8" height="64" fill="#2D2430"/>
  <text x="1248" y="546" text-anchor="end" fill="#2D2430" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">2.2819M H or 0.023% of max</text>

  <rect x="112" y="628" width="1176" height="96" fill="#D98858"/>
  <rect x="128" y="644" width="1176" height="96" fill="#6B2B30"/>
  <rect x="112" y="628" width="1176" height="96" fill="#F7E9D7" stroke="#2D2430" stroke-width="3"/>
  <text x="144" y="682" fill="#2D2430" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700">READ</text>
  <text x="260" y="674" fill="#2D2430" font-family="Arial, Helvetica, sans-serif" font-size="18">
    <tspan x="260" dy="0">This is why the public market can look tradable and still stay unstable.</tspan>
    <tspan x="260" dy="24">Visible depth is small enough that marginal demand can move price faster than most readers expect.</tspan>
  </text>
</svg>
