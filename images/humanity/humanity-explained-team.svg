<svg width="1400" height="980" viewBox="0 0 1400 980" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Humanity founder and team capture</title>
  <desc id="desc">Editorial capture showing Humanity Protocol founder, foundation leadership, and funding structure.</desc>
  <defs>
    <filter id="grain" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.82" numOctaves="2" stitchTiles="stitch" result="noise"/>
      <feColorMatrix in="noise" type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.05"/>
      </feComponentTransfer>
    </filter>
  </defs>

  <rect width="1400" height="980" fill="#F1E6CF"/>
  <rect width="1400" height="980" fill="#F1E6CF" filter="url(#grain)"/>

  <rect x="68" y="56" width="1264" height="864" fill="#F6EEDB"/>
  <rect x="86" y="74" width="1264" height="864" fill="#2D2430"/>
  <rect x="68" y="56" width="1264" height="864" fill="#F6EEDB" stroke="#2D2430" stroke-width="3"/>

  <text x="108" y="114" fill="#8C2F39" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700" letter-spacing="2">FOUNDER AND OPERATORS</text>
  <text x="108" y="162" fill="#2D2430" font-family="Georgia, 'Times New Roman', serif" font-size="40" font-weight="700">Who Runs Humanity?</text>
  <text x="108" y="196" fill="#7D3A3E" font-family="Arial, Helvetica, sans-serif" font-size="17">
    <tspan x="108" dy="0">Humanity still has a visible founder-and-foundation structure,</tspan>
    <tspan x="108" dy="22">even while it talks about longer-term community governance.</tspan>
  </text>

  <rect x="108" y="240" width="356" height="206" fill="#E7A0A4"/>
  <rect x="126" y="258" width="356" height="206" fill="#B3472F"/>
  <rect x="108" y="240" width="356" height="206" fill="#F7E9D7" stroke="#2D2430" stroke-width="3"/>
  <text x="142" y="282" fill="#8C2F39" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">FOUNDER</text>
  <text x="142" y="326" fill="#2D2430" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700">Terence Kwok</text>
  <text x="142" y="374" fill="#2D2430" font-family="Arial, Helvetica, sans-serif" font-size="16">
    <tspan x="142" dy="0">The protocol still has a visible public</tspan>
    <tspan x="142" dy="21">founder rather than a faceless team.</tspan>
  </text>

  <rect x="522" y="240" width="356" height="206" fill="#D98858"/>
  <rect x="540" y="258" width="356" height="206" fill="#6B2B30"/>
  <rect x="522" y="240" width="356" height="206" fill="#F7E9D7" stroke="#2D2430" stroke-width="3"/>
  <text x="556" y="282" fill="#8C2F39" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">FOUNDATION</text>
  <text x="556" y="318" fill="#2D2430" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">
    <tspan x="556" dy="0">Yeewai Chong</tspan>
    <tspan x="556" dy="22">Mario Nawfal, Yat Siu</tspan>
  </text>
  <text x="556" y="374" fill="#2D2430" font-family="Arial, Helvetica, sans-serif" font-size="16">
    <tspan x="556" dy="0">CEO and directors make the operating</tspan>
    <tspan x="556" dy="21">structure easier to read than peers.</tspan>
  </text>

  <rect x="936" y="240" width="288" height="206" fill="#E7A0A4"/>
  <rect x="954" y="258" width="288" height="206" fill="#B3472F"/>
  <rect x="936" y="240" width="288" height="206" fill="#F7E9D7" stroke="#2D2430" stroke-width="3"/>
  <text x="968" y="282" fill="#8C2F39" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">BACKERS</text>
  <text x="968" y="326" fill="#2D2430" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">$1.1B FDV round</text>
  <text x="968" y="374" fill="#2D2430" font-family="Arial, Helvetica, sans-serif" font-size="16">
    <tspan x="968" dy="0">Jump and Pantera were listed</tspan>
    <tspan x="968" dy="21">in the official funding post.</tspan>
  </text>

  <rect x="108" y="492" width="1116" height="286" fill="#D98858"/>
  <rect x="126" y="510" width="1116" height="286" fill="#6B2B30"/>
  <rect x="108" y="492" width="1116" height="286" fill="#F7E9D7" stroke="#2D2430" stroke-width="3"/>
  <text x="142" y="536" fill="#2D2430" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700">AT A GLANCE</text>
  <text x="142" y="586" fill="#2D2430" font-family="Arial, Helvetica, sans-serif" font-size="18">
    <tspan x="142" dy="0">1. Humanity still looks like a public founder-and-foundation project in 2026.</tspan>
    <tspan x="142" dy="34">2. That makes the protocol easier to map than a leaderless community network.</tspan>
    <tspan x="142" dy="34">3. It also means governance decentralization should be judged by progress, not slogans.</tspan>
    <tspan x="142" dy="34">4. Capital support adds credibility, but not proof of long-term protocol success.</tspan>
  </text>
  <text x="142" y="736" fill="#7D3A3E" font-family="Arial, Helvetica, sans-serif" font-size="17">
    <tspan x="142" dy="0">The right reading is neither “fully centralized” nor “already decentralized.”</tspan>
    <tspan x="142" dy="22">Humanity still sits in the middle of that transition.</tspan>
  </text>

  <rect x="108" y="830" width="1116" height="76" fill="#E7A0A4"/>
  <rect x="124" y="846" width="1116" height="76" fill="#B3472F"/>
  <rect x="108" y="830" width="1116" height="76" fill="#F7E9D7" stroke="#2D2430" stroke-width="3"/>
  <text x="142" y="876" fill="#2D2430" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">READ</text>
  <text x="244" y="876" fill="#2D2430" font-family="Arial, Helvetica, sans-serif" font-size="17">Humanity is still operated through a visible founder, foundation, and investor-backed expansion phase.</text>
</svg>
