<svg width="1400" height="980" viewBox="0 0 1400 980" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Humanity market capture</title>
  <desc id="desc">Editorial market snapshot for Humanity Protocol with improved spacing, padding, hierarchy, and safer text zones.</desc>
  <defs>
    <filter id="grain" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.82" numOctaves="2" stitchTiles="stitch" result="noise"/>
      <feColorMatrix in="noise" type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.05"/>
      </feComponentTransfer>
    </filter>
  </defs>

  <rect width="1400" height="980" fill="#F1E6CF"/>
  <rect width="1400" height="980" fill="#F1E6CF" filter="url(#grain)"/>

  <rect x="68" y="56" width="1264" height="860" fill="#F6EEDB"/>
  <rect x="86" y="74" width="1264" height="860" fill="#2D2430"/>
  <rect x="68" y="56" width="1264" height="860" fill="#F6EEDB" stroke="#2D2430" stroke-width="3"/>

  <text x="108" y="114" fill="#8C2F39" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700" letter-spacing="2">MARKET SNAPSHOT</text>
  <circle cx="142" cy="160" r="26" fill="#2E6DF6"/>
  <text x="142" y="168" text-anchor="middle" fill="#FFFFFF" font-family="Georgia, 'Times New Roman', serif" font-size="26" font-weight="700">H</text>
  <text x="184" y="160" fill="#2D2430" font-family="Georgia, 'Times New Roman', serif" font-size="40" font-weight="700">Humanity Protocol</text>
  <text x="184" y="194" fill="#7D3A3E" font-family="Arial, Helvetica, sans-serif" font-size="17">
    <tspan x="184" dy="0">April 29, 2026.</tspan>
    <tspan x="184" dy="22">H is repricing in a market where access widened faster than visible public depth.</tspan>
  </text>

  <rect x="108" y="236" width="254" height="154" fill="#E7A0A4"/>
  <rect x="124" y="252" width="254" height="154" fill="#B3472F"/>
  <rect x="108" y="236" width="254" height="154" fill="#F7E9D7" stroke="#2D2430" stroke-width="3"/>
  <text x="138" y="278" fill="#8C2F39" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="700">PRICE</text>
  <text x="138" y="332" fill="#2D2430" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700">$0.1739</text>
  <text x="138" y="360" fill="#8C2F39" font-family="Arial, Helvetica, sans-serif" font-size="16">24h: +25.92%</text>

  <rect x="398" y="236" width="254" height="154" fill="#D98858"/>
  <rect x="414" y="252" width="254" height="154" fill="#6B2B30"/>
  <rect x="398" y="236" width="254" height="154" fill="#F7E9D7" stroke="#2D2430" stroke-width="3"/>
  <text x="428" y="278" fill="#8C2F39" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="700">MARKET CAP</text>
  <text x="428" y="332" fill="#2D2430" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700">$474.25M</text>
  <text x="428" y="360" fill="#8C2F39" font-family="Arial, Helvetica, sans-serif" font-size="16">FDV: $1.74B</text>

  <rect x="688" y="236" width="254" height="154" fill="#E7A0A4"/>
  <rect x="704" y="252" width="254" height="154" fill="#B3472F"/>
  <rect x="688" y="236" width="254" height="154" fill="#F7E9D7" stroke="#2D2430" stroke-width="3"/>
  <text x="718" y="278" fill="#8C2F39" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="700">24H VOLUME</text>
  <text x="718" y="332" fill="#2D2430" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700">$76.96M</text>
  <text x="718" y="360" fill="#8C2F39" font-family="Arial, Helvetica, sans-serif" font-size="16">7d: +50.36%</text>

  <rect x="978" y="236" width="254" height="154" fill="#D98858"/>
  <rect x="994" y="252" width="254" height="154" fill="#6B2B30"/>
  <rect x="978" y="236" width="254" height="154" fill="#F7E9D7" stroke="#2D2430" stroke-width="3"/>
  <text x="1008" y="278" fill="#8C2F39" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="700">HOLDERS</text>
  <text x="1008" y="332" fill="#2D2430" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700">4,736</text>
  <text x="1008" y="360" fill="#8C2F39" font-family="Arial, Helvetica, sans-serif" font-size="16">CoinMarketCap count</text>

  <rect x="108" y="430" width="540" height="202" fill="#D98858"/>
  <rect x="126" y="448" width="540" height="202" fill="#6B2B30"/>
  <rect x="108" y="430" width="540" height="202" fill="#F7E9D7" stroke="#2D2430" stroke-width="3"/>
  <text x="142" y="472" fill="#8C2F39" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">SUPPLY FRAME</text>
  <text x="142" y="520" fill="#2D2430" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">Circulating: 2.7268B H</text>
  <text x="142" y="556" fill="#2D2430" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">Max supply: 10.0B H</text>
  <text x="142" y="606" fill="#7D3A3E" font-family="Arial, Helvetica, sans-serif" font-size="17">
    <tspan x="142" dy="0">Headline supply looks large.</tspan>
    <tspan x="142" dy="22">That is not the same thing as deep tradable float.</tspan>
  </text>

  <rect x="690" y="430" width="542" height="202" fill="#E7A0A4"/>
  <rect x="708" y="448" width="542" height="202" fill="#B3472F"/>
  <rect x="690" y="430" width="542" height="202" fill="#F7E9D7" stroke="#2D2430" stroke-width="3"/>
  <text x="724" y="472" fill="#8C2F39" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">VISIBLE PUBLIC FLOAT</text>
  <text x="724" y="520" fill="#2D2430" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">$586.08K public liquidity</text>
  <text x="724" y="556" fill="#2D2430" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">2.2819M H in visible pools</text>
  <text x="724" y="606" fill="#7D3A3E" font-family="Arial, Helvetica, sans-serif" font-size="17">
    <tspan x="724" dy="0">Enough to trade.</tspan>
    <tspan x="724" dy="22">Not enough to keep repricing calm once demand routes in.</tspan>
  </text>

  <rect x="108" y="676" width="1124" height="168" fill="#E7A0A4"/>
  <rect x="126" y="694" width="1124" height="168" fill="#B3472F"/>
  <rect x="108" y="676" width="1124" height="168" fill="#F7E9D7" stroke="#2D2430" stroke-width="3"/>
  <text x="142" y="720" fill="#2D2430" font-family="Arial, Helvetica, sans-serif" font-size="21" font-weight="700">EDITORIAL READ</text>
  <text x="142" y="762" fill="#2D2430" font-family="Arial, Helvetica, sans-serif" font-size="18">
    <tspan x="142" dy="0">H is acting like a launch token with wide access</tspan>
    <tspan x="142" dy="24">and narrow visible public depth.</tspan>
    <tspan x="142" dy="24">That is why the move can look real and still stay unstable.</tspan>
  </text>
  <text x="142" y="828" fill="#7D3A3E" font-family="Arial, Helvetica, sans-serif" font-size="16">Source base: CoinMarketCap, DexScreener, Humanity Explorer.</text>
</svg>
