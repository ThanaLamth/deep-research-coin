<svg width="1400" height="900" viewBox="0 0 1400 900" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Humanity market snapshot capture</title>
  <desc id="desc">A visual summary of Humanity Protocol market, supply, holder, and public liquidity metrics checked on April 29, 2026.</desc>
  <rect width="1400" height="900" rx="28" fill="#F5F1E8"/>
  <text x="70" y="74" fill="#1E293B" font-family="Georgia, 'Times New Roman', serif" font-size="34" font-weight="700">Humanity Market Snapshot</text>
  <text x="70" y="108" fill="#475569" font-family="Arial, Helvetica, sans-serif" font-size="18">Point-in-time market, supply, holder, and liquidity metrics used in the April 29, 2026 review</text>

  <rect x="70" y="150" width="300" height="130" rx="22" fill="#FFF7ED"/>
  <text x="98" y="194" fill="#9A3412" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">Price</text>
  <text x="98" y="242" fill="#9A3412" font-family="Arial, Helvetica, sans-serif" font-size="36" font-weight="700">$0.1739</text>
  <text x="98" y="268" fill="#9A3412" font-family="Arial, Helvetica, sans-serif" font-size="16">24h change: +25.92%</text>

  <rect x="390" y="150" width="300" height="130" rx="22" fill="#ECFDF5"/>
  <text x="418" y="194" fill="#166534" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">Market Cap</text>
  <text x="418" y="242" fill="#166534" font-family="Arial, Helvetica, sans-serif" font-size="36" font-weight="700">$474.25M</text>
  <text x="418" y="268" fill="#166534" font-family="Arial, Helvetica, sans-serif" font-size="16">FDV: $1.74B</text>

  <rect x="710" y="150" width="300" height="130" rx="22" fill="#EFF6FF"/>
  <text x="738" y="194" fill="#1D4ED8" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">24h Volume</text>
  <text x="738" y="242" fill="#1D4ED8" font-family="Arial, Helvetica, sans-serif" font-size="36" font-weight="700">$76.96M</text>
  <text x="738" y="268" fill="#1D4ED8" font-family="Arial, Helvetica, sans-serif" font-size="16">7d change: +50.36%</text>

  <rect x="1030" y="150" width="300" height="130" rx="22" fill="#FEF2F2"/>
  <text x="1058" y="194" fill="#B91C1C" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">Holder Base</text>
  <text x="1058" y="242" fill="#B91C1C" font-family="Arial, Helvetica, sans-serif" font-size="36" font-weight="700">4,736</text>
  <text x="1058" y="268" fill="#B91C1C" font-family="Arial, Helvetica, sans-serif" font-size="16">CoinMarketCap holder count</text>

  <rect x="70" y="320" width="400" height="180" rx="22" fill="#FFFBEB"/>
  <text x="98" y="362" fill="#92400E" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">Supply</text>
  <text x="98" y="402" fill="#92400E" font-family="Arial, Helvetica, sans-serif" font-size="18">Circulating: 2.7268B H</text>
  <text x="98" y="436" fill="#92400E" font-family="Arial, Helvetica, sans-serif" font-size="18">Max supply: 10.0B H</text>
  <text x="98" y="470" fill="#92400E" font-family="Arial, Helvetica, sans-serif" font-size="18">30d change: +104.57%</text>

  <rect x="500" y="320" width="400" height="180" rx="22" fill="#F0FDF4"/>
  <text x="528" y="362" fill="#166534" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">Visible Public DEX Liquidity</text>
  <text x="528" y="402" fill="#166534" font-family="Arial, Helvetica, sans-serif" font-size="18">$586.08K reviewed on Ethereum</text>
  <text x="528" y="436" fill="#166534" font-family="Arial, Helvetica, sans-serif" font-size="18">Only 2.2819M H in visible pools</text>
  <text x="528" y="470" fill="#166534" font-family="Arial, Helvetica, sans-serif" font-size="18">0.084% of circulating supply</text>

  <rect x="930" y="320" width="400" height="180" rx="22" fill="#EEF2FF"/>
  <text x="958" y="362" fill="#4338CA" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">Flow Mismatch</text>
  <text x="958" y="402" fill="#4338CA" font-family="Arial, Helvetica, sans-serif" font-size="18">Visible DEX volume: $7.81K</text>
  <text x="958" y="436" fill="#4338CA" font-family="Arial, Helvetica, sans-serif" font-size="18">CMC 24h volume: $76.96M</text>
  <text x="958" y="470" fill="#4338CA" font-family="Arial, Helvetica, sans-serif" font-size="18">Public DEX share: 0.010%</text>

  <rect x="70" y="560" width="1260" height="240" rx="26" fill="#FFFFFF"/>
  <text x="98" y="604" fill="#1E293B" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700">Why these numbers matter</text>
  <text x="98" y="646" fill="#334155" font-family="Arial, Helvetica, sans-serif" font-size="18">Humanity is trading with a meaningful market cap and large headline turnover, but the visible public Ethereum-side pools are still tiny.</text>
  <text x="98" y="682" fill="#334155" font-family="Arial, Helvetica, sans-serif" font-size="18">That does not prove the entire market float is tiny, because centralized exchanges hold inventory too. It does prove that the public pools are too thin to keep price discovery calm.</text>
  <text x="98" y="718" fill="#334155" font-family="Arial, Helvetica, sans-serif" font-size="18">The most useful framing is simple: access widened fast, demand became easier to route, and the visible public liquidity base remained narrow enough to amplify the repricing.</text>

  <text x="70" y="850" fill="#64748B" font-family="Arial, Helvetica, sans-serif" font-size="15">Sources used for this capture: CoinMarketCap, DexScreener, Humanity Explorer. Metrics checked on April 29, 2026.</text>
</svg>
