<svg width="1400" height="920" viewBox="0 0 1400 920" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Humanity market capture</title>
  <desc id="desc">Editorial-style market snapshot for Humanity Protocol using the same print-inspired visual system as the LUNC capture set.</desc>
  <defs>
    <filter id="grain" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch" result="noise"/>
      <feColorMatrix in="noise" type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.05"/>
      </feComponentTransfer>
    </filter>
  </defs>
  <rect width="1400" height="920" fill="#F1E6CF"/>
  <rect width="1400" height="920" fill="#F1E6CF" filter="url(#grain)"/>

  <rect x="74" y="68" width="1252" height="784" fill="#F6EEDB"/>
  <rect x="92" y="86" width="1252" height="784" fill="#2D2430"/>
  <rect x="74" y="68" width="1252" height="784" fill="#F6EEDB" stroke="#2D2430" stroke-width="3"/>

  <circle cx="120" cy="128" r="24" fill="#2E6DF6"/>
  <text x="120" y="136" text-anchor="middle" fill="#FFFFFF" font-family="Georgia, 'Times New Roman', serif" font-size="26" font-weight="700">H</text>
  <text x="156" y="136" fill="#2D2430" font-family="Georgia, 'Times New Roman', serif" font-size="38" font-weight="700">Humanity Market Snapshot</text>
  <text x="116" y="172" fill="#7D3A3E" font-family="Arial, Helvetica, sans-serif" font-size="18">April 29, 2026 • H is repricing fast because access widened before visible public liquidity really deepened.</text>

  <rect x="116" y="216" width="260" height="150" fill="#E7A0A4"/>
  <rect x="132" y="232" width="260" height="150" fill="#B3472F"/>
  <rect x="116" y="216" width="260" height="150" fill="#F7E9D7" stroke="#2D2430" stroke-width="3"/>
  <text x="142" y="258" fill="#8C2F39" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">PRICE</text>
  <text x="142" y="314" fill="#2D2430" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700">$0.1739</text>
  <text x="142" y="342" fill="#8C2F39" font-family="Arial, Helvetica, sans-serif" font-size="16">24h: +25.92%</text>

  <rect x="420" y="216" width="260" height="150" fill="#D98858"/>
  <rect x="436" y="232" width="260" height="150" fill="#6B2B30"/>
  <rect x="420" y="216" width="260" height="150" fill="#F7E9D7" stroke="#2D2430" stroke-width="3"/>
  <text x="446" y="258" fill="#8C2F39" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">MARKET CAP</text>
  <text x="446" y="314" fill="#2D2430" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700">$474.25M</text>
  <text x="446" y="342" fill="#8C2F39" font-family="Arial, Helvetica, sans-serif" font-size="16">FDV: $1.74B</text>

  <rect x="724" y="216" width="260" height="150" fill="#E7A0A4"/>
  <rect x="740" y="232" width="260" height="150" fill="#B3472F"/>
  <rect x="724" y="216" width="260" height="150" fill="#F7E9D7" stroke="#2D2430" stroke-width="3"/>
  <text x="750" y="258" fill="#8C2F39" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">24H VOLUME</text>
  <text x="750" y="314" fill="#2D2430" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700">$76.96M</text>
  <text x="750" y="342" fill="#8C2F39" font-family="Arial, Helvetica, sans-serif" font-size="16">7d: +50.36%</text>

  <rect x="1028" y="216" width="260" height="150" fill="#D98858"/>
  <rect x="1044" y="232" width="260" height="150" fill="#6B2B30"/>
  <rect x="1028" y="216" width="260" height="150" fill="#F7E9D7" stroke="#2D2430" stroke-width="3"/>
  <text x="1054" y="258" fill="#8C2F39" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">HOLDERS</text>
  <text x="1054" y="314" fill="#2D2430" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700">4,736</text>
  <text x="1054" y="342" fill="#8C2F39" font-family="Arial, Helvetica, sans-serif" font-size="16">CMC holder count</text>

  <rect x="116" y="426" width="548" height="174" fill="#E7A0A4"/>
  <rect x="134" y="444" width="548" height="174" fill="#6B2B30"/>
  <rect x="116" y="426" width="548" height="174" fill="#F7E9D7" stroke="#2D2430" stroke-width="3"/>
  <text x="148" y="466" fill="#8C2F39" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">SUPPLY</text>
  <text x="148" y="512" fill="#2D2430" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">Circulating: 2.7268B H</text>
  <text x="148" y="548" fill="#2D2430" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">Max: 10.0B H</text>
  <text x="148" y="582" fill="#7D3A3E" font-family="Arial, Helvetica, sans-serif" font-size="17">The headline supply is large, but the visible public float is much narrower than it looks.</text>

  <rect x="708" y="426" width="580" height="174" fill="#D98858"/>
  <rect x="726" y="444" width="580" height="174" fill="#8C2F39"/>
  <rect x="708" y="426" width="580" height="174" fill="#F7E9D7" stroke="#2D2430" stroke-width="3"/>
  <text x="740" y="466" fill="#8C2F39" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">VISIBLE PUBLIC DEX FLOAT</text>
  <text x="740" y="512" fill="#2D2430" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">$586.08K liquidity reviewed</text>
  <text x="740" y="548" fill="#2D2430" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">2.2819M H or 0.084% of circ.</text>
  <text x="740" y="582" fill="#7D3A3E" font-family="Arial, Helvetica, sans-serif" font-size="17">Enough to trade, not enough to keep repricing smooth.</text>

  <rect x="116" y="654" width="1172" height="142" fill="#E7A0A4"/>
  <rect x="136" y="674" width="1172" height="142" fill="#B3472F"/>
  <rect x="116" y="654" width="1172" height="142" fill="#F7E9D7" stroke="#2D2430" stroke-width="3"/>
  <text x="148" y="694" fill="#2D2430" font-family="Arial, Helvetica, sans-serif" font-size="21" font-weight="700">EDITORIAL READ</text>
  <text x="148" y="726" fill="#2D2430" font-family="Arial, Helvetica, sans-serif" font-size="18">
    <tspan x="148" dy="0">H is not moving like a deep market. It is moving like a launch token whose access expanded fast</tspan>
    <tspan x="148" dy="24">while the visible public liquidity base stayed thin enough to amplify each wave of demand.</tspan>
  </text>
  <text x="148" y="782" fill="#7D3A3E" font-family="Arial, Helvetica, sans-serif" font-size="16">Source base: CoinMarketCap, DexScreener, Humanity Explorer.</text>
</svg>
