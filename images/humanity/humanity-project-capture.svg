<svg width="1400" height="980" viewBox="0 0 1400 980" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Humanity project capture</title>
  <desc id="desc">Editorial project overview for Humanity Protocol with stronger hierarchy, safer text zones, and more consistent spacing.</desc>
  <defs>
    <filter id="grain" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="2" stitchTiles="stitch" result="noise"/>
      <feColorMatrix in="noise" type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.05"/>
      </feComponentTransfer>
    </filter>
  </defs>

  <rect width="1400" height="980" fill="#F1E6CF"/>
  <rect width="1400" height="980" fill="#F1E6CF" filter="url(#grain)"/>

  <rect x="68" y="56" width="1264" height="864" fill="#F6EEDB"/>
  <rect x="86" y="74" width="1264" height="864" fill="#2D2430"/>
  <rect x="68" y="56" width="1264" height="864" fill="#F6EEDB" stroke="#2D2430" stroke-width="3"/>

  <text x="108" y="114" fill="#8C2F39" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700" letter-spacing="2">PROJECT OVERVIEW</text>
  <circle cx="142" cy="160" r="26" fill="#2E6DF6"/>
  <text x="142" y="168" text-anchor="middle" fill="#FFFFFF" font-family="Georgia, 'Times New Roman', serif" font-size="26" font-weight="700">H</text>
  <text x="184" y="160" fill="#2D2430" font-family="Georgia, 'Times New Roman', serif" font-size="40" font-weight="700">Humanity Protocol</text>
  <text x="184" y="194" fill="#7D3A3E" font-family="Arial, Helvetica, sans-serif" font-size="17">
    <tspan x="184" dy="0">A digital identity network now being framed as broader trust infrastructure,</tspan>
    <tspan x="184" dy="22">not just a narrow proof-of-humanity token story.</tspan>
  </text>
  <text x="1112" y="154" fill="#8C2F39" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="700">TOKEN</text>
  <text x="1112" y="180" fill="#2D2430" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="700">H</text>
  <text x="1112" y="204" fill="#2D2430" font-family="Arial, Helvetica, sans-serif" font-size="15">Max supply: 10.0B</text>

  <rect x="108" y="236" width="356" height="216" fill="#E7A0A4"/>
  <rect x="126" y="254" width="356" height="216" fill="#B3472F"/>
  <rect x="108" y="236" width="356" height="216" fill="#F7E9D7" stroke="#2D2430" stroke-width="3"/>
  <text x="142" y="278" fill="#8C2F39" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">WHAT IT IS</text>
  <text x="142" y="320" fill="#2D2430" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">
    <tspan x="142" dy="0">Identity and credential</tspan>
    <tspan x="142" dy="28">infrastructure</tspan>
  </text>
  <text x="142" y="372" fill="#2D2430" font-family="Arial, Helvetica, sans-serif" font-size="16">
    <tspan x="142" dy="0">Humanity positions H as the economic</tspan>
    <tspan x="142" dy="21">rail behind Human ID, trust signals,</tspan>
    <tspan x="142" dy="21">reusable credentials, and privacy-first</tspan>
    <tspan x="142" dy="21">proof systems.</tspan>
  </text>

  <rect x="522" y="236" width="356" height="216" fill="#D98858"/>
  <rect x="540" y="254" width="356" height="216" fill="#6B2B30"/>
  <rect x="522" y="236" width="356" height="216" fill="#F7E9D7" stroke="#2D2430" stroke-width="3"/>
  <text x="556" y="278" fill="#8C2F39" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">WHAT CHANGED</text>
  <text x="556" y="320" fill="#2D2430" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">
    <tspan x="556" dy="0">Proof of humanity</tspan>
    <tspan x="556" dy="28">expanded into trust</tspan>
  </text>
  <text x="556" y="372" fill="#2D2430" font-family="Arial, Helvetica, sans-serif" font-size="16">
    <tspan x="556" dy="0">The April 24 rollout widened the story</tspan>
    <tspan x="556" dy="21">from uniqueness checks into a broader</tspan>
    <tspan x="556" dy="21">proof-of-trust identity layer for</tspan>
    <tspan x="556" dy="21">Web3 and Web2 use cases.</tspan>
  </text>

  <rect x="936" y="236" width="288" height="216" fill="#E7A0A4"/>
  <rect x="954" y="254" width="288" height="216" fill="#B3472F"/>
  <rect x="936" y="236" width="288" height="216" fill="#F7E9D7" stroke="#2D2430" stroke-width="3"/>
  <text x="968" y="278" fill="#8C2F39" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">WHY IT MATTERED</text>
  <text x="968" y="320" fill="#2D2430" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">
    <tspan x="968" dy="0">The launch stack</tspan>
    <tspan x="968" dy="28">arrived together</tspan>
  </text>
  <text x="968" y="372" fill="#2D2430" font-family="Arial, Helvetica, sans-serif" font-size="16">
    <tspan x="968" dy="0">Mainnet, fairdrop, staking,</tspan>
    <tspan x="968" dy="20">Fireblocks, Mastercard, and</tspan>
    <tspan x="968" dy="20">wallet access all landed in</tspan>
    <tspan x="968" dy="20">the same window.</tspan>
  </text>

  <rect x="108" y="492" width="1116" height="314" fill="#D98858"/>
  <rect x="126" y="510" width="1116" height="314" fill="#6B2B30"/>
  <rect x="108" y="492" width="1116" height="314" fill="#F7E9D7" stroke="#2D2430" stroke-width="3"/>
  <text x="142" y="536" fill="#2D2430" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700">AT A GLANCE</text>
  <text x="142" y="586" fill="#2D2430" font-family="Arial, Helvetica, sans-serif" font-size="18">
    <tspan x="142" dy="0">1. Team and investor buckets both show 0% unlocked at TGE.</tspan>
    <tspan x="142" dy="34">2. Fairdrop users could stake for 90 days and receive a 25% bonus.</tspan>
    <tspan x="142" dy="34">3. Fireblocks widened custody access.</tspan>
    <tspan x="170" dy="24">Mastercard widened the finance angle.</tspan>
    <tspan x="142" dy="34">4. Together, that gave H both a launch story</tspan>
    <tspan x="170" dy="24">and a broader infrastructure narrative.</tspan>
  </text>
  <text x="142" y="772" fill="#7D3A3E" font-family="Arial, Helvetica, sans-serif" font-size="17">
    <tspan x="142" dy="0">The shorthand is simple: Humanity was not just listed.</tspan>
    <tspan x="142" dy="22">It reached the market through a full stack of claims, sinks, and access rails.</tspan>
  </text>

  <rect x="108" y="836" width="1116" height="90" fill="#E7A0A4"/>
  <rect x="124" y="854" width="1116" height="90" fill="#B3472F"/>
  <rect x="108" y="836" width="1116" height="90" fill="#F7E9D7" stroke="#2D2430" stroke-width="3"/>
  <text x="142" y="878" fill="#2D2430" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">READ</text>
  <text x="244" y="878" fill="#2D2430" font-family="Arial, Helvetica, sans-serif" font-size="17">This is an access-and-trust launch narrative, not a one-headline listing story.</text>
</svg>
