<svg width="1400" height="980" viewBox="0 0 1400 980" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Humanity Protocol overview capture</title>
  <desc id="desc">Editorial overview explaining Humanity Protocol as a trust infrastructure project built around verification, credentials, and privacy-preserving proofs.</desc>
  <defs>
    <filter id="grain" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.82" numOctaves="2" stitchTiles="stitch" result="noise"/>
      <feColorMatrix in="noise" type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.05"/>
      </feComponentTransfer>
    </filter>
  </defs>

  <rect width="1400" height="980" fill="#F1E6CF"/>
  <rect width="1400" height="980" fill="#F1E6CF" filter="url(#grain)"/>

  <rect x="68" y="56" width="1264" height="864" fill="#F6EEDB"/>
  <rect x="86" y="74" width="1264" height="864" fill="#2D2430"/>
  <rect x="68" y="56" width="1264" height="864" fill="#F6EEDB" stroke="#2D2430" stroke-width="3"/>

  <text x="108" y="114" fill="#8C2F39" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700" letter-spacing="2">WHAT IS HUMANITY PROTOCOL</text>
  <circle cx="142" cy="160" r="26" fill="#2E6DF6"/>
  <text x="142" y="168" text-anchor="middle" fill="#FFFFFF" font-family="Georgia, 'Times New Roman', serif" font-size="26" font-weight="700">H</text>
  <text x="184" y="160" fill="#2D2430" font-family="Georgia, 'Times New Roman', serif" font-size="40" font-weight="700">Humanity Protocol</text>
  <text x="184" y="194" fill="#7D3A3E" font-family="Arial, Helvetica, sans-serif" font-size="17">
    <tspan x="184" dy="0">A digital identity and trust layer built around</tspan>
    <tspan x="184" dy="22">verification, portable credentials, and privacy-preserving proofs.</tspan>
  </text>

  <rect x="108" y="236" width="356" height="206" fill="#E7A0A4"/>
  <rect x="126" y="254" width="356" height="206" fill="#B3472F"/>
  <rect x="108" y="236" width="356" height="206" fill="#F7E9D7" stroke="#2D2430" stroke-width="3"/>
  <text x="142" y="278" fill="#8C2F39" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">WHAT IT DOES</text>
  <text x="142" y="322" fill="#2D2430" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">Verify once, reuse often</text>
  <text x="142" y="372" fill="#2D2430" font-family="Arial, Helvetica, sans-serif" font-size="16">
    <tspan x="142" dy="0">Users verify once, then prove useful</tspan>
    <tspan x="142" dy="21">claims without repeatedly exposing</tspan>
    <tspan x="142" dy="21">the raw underlying personal data.</tspan>
  </text>

  <rect x="522" y="236" width="356" height="206" fill="#D98858"/>
  <rect x="540" y="254" width="356" height="206" fill="#6B2B30"/>
  <rect x="522" y="236" width="356" height="206" fill="#F7E9D7" stroke="#2D2430" stroke-width="3"/>
  <text x="556" y="278" fill="#8C2F39" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">WHAT CHANGED</text>
  <text x="556" y="322" fill="#2D2430" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">Proof of Humanity to Trust</text>
  <text x="556" y="372" fill="#2D2430" font-family="Arial, Helvetica, sans-serif" font-size="16">
    <tspan x="556" dy="0">The project is widening from human</tspan>
    <tspan x="556" dy="21">checks into reusable trust claims around</tspan>
    <tspan x="556" dy="21">age, residency, school, and compliance.</tspan>
  </text>

  <rect x="936" y="236" width="288" height="206" fill="#E7A0A4"/>
  <rect x="954" y="254" width="288" height="206" fill="#B3472F"/>
  <rect x="936" y="236" width="288" height="206" fill="#F7E9D7" stroke="#2D2430" stroke-width="3"/>
  <text x="968" y="278" fill="#8C2F39" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">WHY IT MATTERS</text>
  <text x="968" y="322" fill="#2D2430" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700">Trust becomes portable</text>
  <text x="968" y="372" fill="#2D2430" font-family="Arial, Helvetica, sans-serif" font-size="16">
    <tspan x="968" dy="0">That opens a wider field than</tspan>
    <tspan x="968" dy="21">anti-bot verification alone.</tspan>
  </text>

  <rect x="108" y="492" width="1116" height="286" fill="#D98858"/>
  <rect x="126" y="510" width="1116" height="286" fill="#6B2B30"/>
  <rect x="108" y="492" width="1116" height="286" fill="#F7E9D7" stroke="#2D2430" stroke-width="3"/>
  <text x="142" y="536" fill="#2D2430" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700">AT A GLANCE</text>
  <text x="142" y="586" fill="#2D2430" font-family="Arial, Helvetica, sans-serif" font-size="18">
    <tspan x="142" dy="0">1. Humanity is not just a coin. It is a trust infrastructure claim.</tspan>
    <tspan x="142" dy="34">2. The product stack includes app onboarding, credentials, and protocol rails.</tspan>
    <tspan x="142" dy="34">3. The strategic shift is from proving uniqueness to proving useful trust.</tspan>
    <tspan x="142" dy="34">4. That gives the project a wider addressable market than a pure anti-bot tool.</tspan>
  </text>
  <text x="142" y="736" fill="#7D3A3E" font-family="Arial, Helvetica, sans-serif" font-size="17">
    <tspan x="142" dy="0">The project becomes easier to understand once identity is treated as infrastructure,</tspan>
    <tspan x="142" dy="22">not as a one-time verification gimmick.</tspan>
  </text>

  <rect x="108" y="830" width="1116" height="76" fill="#E7A0A4"/>
  <rect x="124" y="846" width="1116" height="76" fill="#B3472F"/>
  <rect x="108" y="830" width="1116" height="76" fill="#F7E9D7" stroke="#2D2430" stroke-width="3"/>
  <text x="142" y="876" fill="#2D2430" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">READ</text>
  <text x="244" y="876" fill="#2D2430" font-family="Arial, Helvetica, sans-serif" font-size="17">Humanity is trying to make trust reusable, private, and portable across multiple internet systems.</text>
</svg>
