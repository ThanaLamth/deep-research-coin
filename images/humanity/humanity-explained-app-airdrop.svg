<svg width="1400" height="980" viewBox="0 0 1400 980" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Humanity app and fairdrop capture</title>
  <desc id="desc">Editorial capture showing Humanity's official app layer, fairdrop logic, and claim versus staking decision path.</desc>
  <defs>
    <filter id="grain" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.82" numOctaves="2" stitchTiles="stitch" result="noise"/>
      <feColorMatrix in="noise" type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.05"/>
      </feComponentTransfer>
    </filter>
  </defs>

  <rect width="1400" height="980" fill="#F1E6CF"/>
  <rect width="1400" height="980" fill="#F1E6CF" filter="url(#grain)"/>

  <rect x="68" y="56" width="1264" height="864" fill="#F6EEDB"/>
  <rect x="86" y="74" width="1264" height="864" fill="#2D2430"/>
  <rect x="68" y="56" width="1264" height="864" fill="#F6EEDB" stroke="#2D2430" stroke-width="3"/>

  <text x="108" y="114" fill="#8C2F39" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700" letter-spacing="2">APP AND FAIRDROP</text>
  <text x="108" y="162" fill="#2D2430" font-family="Georgia, 'Times New Roman', serif" font-size="40" font-weight="700">How Users Enter Humanity</text>
  <text x="108" y="196" fill="#7D3A3E" font-family="Arial, Helvetica, sans-serif" font-size="17">
    <tspan x="108" dy="0">The app and fairdrop are not side details.</tspan>
    <tspan x="108" dy="22">They are part of how the protocol onboards identity and participation.</tspan>
  </text>

  <rect x="108" y="240" width="356" height="206" fill="#E7A0A4"/>
  <rect x="126" y="258" width="356" height="206" fill="#B3472F"/>
  <rect x="108" y="240" width="356" height="206" fill="#F7E9D7" stroke="#2D2430" stroke-width="3"/>
  <text x="142" y="282" fill="#8C2F39" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">OFFICIAL APP</text>
  <text x="142" y="326" fill="#2D2430" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="700">app.humanity.org</text>
  <text x="142" y="374" fill="#2D2430" font-family="Arial, Helvetica, sans-serif" font-size="16">
    <tspan x="142" dy="0">Official materials also reference iOS</tspan>
    <tspan x="142" dy="21">and Android entry points.</tspan>
  </text>

  <rect x="522" y="240" width="356" height="206" fill="#D98858"/>
  <rect x="540" y="258" width="356" height="206" fill="#6B2B30"/>
  <rect x="522" y="240" width="356" height="206" fill="#F7E9D7" stroke="#2D2430" stroke-width="3"/>
  <text x="556" y="282" fill="#8C2F39" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">CLAIM CHOICE</text>
  <text x="556" y="326" fill="#2D2430" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700">Claim now or stake 90 days</text>
  <text x="556" y="374" fill="#2D2430" font-family="Arial, Helvetica, sans-serif" font-size="16">
    <tspan x="556" dy="0">Users could claim immediately</tspan>
    <tspan x="556" dy="21">or take a 25% staking bonus.</tspan>
  </text>

  <rect x="936" y="240" width="288" height="206" fill="#E7A0A4"/>
  <rect x="954" y="258" width="288" height="206" fill="#B3472F"/>
  <rect x="936" y="240" width="288" height="206" fill="#F7E9D7" stroke="#2D2430" stroke-width="3"/>
  <text x="968" y="282" fill="#8C2F39" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">ELIGIBILITY</text>
  <text x="968" y="326" fill="#2D2430" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700">Campaign-based, not random</text>
  <text x="968" y="374" fill="#2D2430" font-family="Arial, Helvetica, sans-serif" font-size="16">
    <tspan x="968" dy="0">Distribution followed official</tspan>
    <tspan x="968" dy="21">own campaign rules.</tspan>
  </text>

  <rect x="108" y="492" width="1116" height="286" fill="#D98858"/>
  <rect x="126" y="510" width="1116" height="286" fill="#6B2B30"/>
  <rect x="108" y="492" width="1116" height="286" fill="#F7E9D7" stroke="#2D2430" stroke-width="3"/>
  <text x="142" y="536" fill="#2D2430" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700">AT A GLANCE</text>
  <text x="142" y="586" fill="#2D2430" font-family="Arial, Helvetica, sans-serif" font-size="18">
    <tspan x="142" dy="0">1. Humanity needs a real onboarding layer because trust infrastructure has to be usable.</tspan>
    <tspan x="142" dy="34">2. The app route matters as much as the token route for normal users.</tspan>
    <tspan x="142" dy="34">3. The fairdrop was also a behavior design: immediate claim versus longer participation.</tspan>
    <tspan x="142" dy="34">4. That made distribution part of the ecosystem model, not only a marketing event.</tspan>
  </text>
  <text x="142" y="736" fill="#7D3A3E" font-family="Arial, Helvetica, sans-serif" font-size="17">
    <tspan x="142" dy="0">The app and the fairdrop both answer the same deeper question:</tspan>
    <tspan x="142" dy="22">how does Humanity turn identity into an active user system?</tspan>
  </text>

  <rect x="108" y="830" width="1116" height="76" fill="#E7A0A4"/>
  <rect x="124" y="846" width="1116" height="76" fill="#B3472F"/>
  <rect x="108" y="830" width="1116" height="76" fill="#F7E9D7" stroke="#2D2430" stroke-width="3"/>
  <text x="142" y="876" fill="#2D2430" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">READ</text>
  <text x="244" y="876" fill="#2D2430" font-family="Arial, Helvetica, sans-serif" font-size="17">Humanity used the app and fairdrop to connect identity onboarding with token participation.</text>
</svg>
