<svg width="1400" height="980" viewBox="0 0 1400 980" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Humanity tokenomics capture</title>
  <desc id="desc">Editorial tokenomics capture showing Humanity's staged supply structure, early unlock profile, and long-term distribution overhang.</desc>
  <defs>
    <filter id="grain" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.82" numOctaves="2" stitchTiles="stitch" result="noise"/>
      <feColorMatrix in="noise" type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.05"/>
      </feComponentTransfer>
    </filter>
  </defs>

  <rect width="1400" height="980" fill="#F1E6CF"/>
  <rect width="1400" height="980" fill="#F1E6CF" filter="url(#grain)"/>

  <rect x="68" y="56" width="1264" height="864" fill="#F6EEDB"/>
  <rect x="86" y="74" width="1264" height="864" fill="#2D2430"/>
  <rect x="68" y="56" width="1264" height="864" fill="#F6EEDB" stroke="#2D2430" stroke-width="3"/>

  <text x="108" y="114" fill="#8C2F39" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700" letter-spacing="2">TOKENOMICS</text>
  <text x="108" y="162" fill="#2D2430" font-family="Georgia, 'Times New Roman', serif" font-size="40" font-weight="700">How H Supply Is Staged</text>
  <text x="108" y="196" fill="#7D3A3E" font-family="Arial, Helvetica, sans-serif" font-size="17">
    <tspan x="108" dy="0">The useful question is not “good tokenomics or bad tokenomics.”</tspan>
    <tspan x="108" dy="22">It is how clean the first window looked and how heavy the long-term map remains.</tspan>
  </text>

  <rect x="108" y="240" width="356" height="206" fill="#E7A0A4"/>
  <rect x="126" y="258" width="356" height="206" fill="#B3472F"/>
  <rect x="108" y="240" width="356" height="206" fill="#F7E9D7" stroke="#2D2430" stroke-width="3"/>
  <text x="142" y="282" fill="#8C2F39" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">EARLY UNLOCKS</text>
  <text x="142" y="326" fill="#2D2430" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="700">Team 0% | Investors 0%</text>
  <text x="142" y="374" fill="#2D2430" font-family="Arial, Helvetica, sans-serif" font-size="16">
    <tspan x="142" dy="0">The early unlock profile looked cleaner</tspan>
    <tspan x="142" dy="21">than many fast-launch token structures.</tspan>
  </text>

  <rect x="522" y="240" width="356" height="206" fill="#D98858"/>
  <rect x="540" y="258" width="356" height="206" fill="#6B2B30"/>
  <rect x="522" y="240" width="356" height="206" fill="#F7E9D7" stroke="#2D2430" stroke-width="3"/>
  <text x="556" y="282" fill="#8C2F39" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">LARGE BUCKETS</text>
  <text x="556" y="326" fill="#2D2430" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700">Ecosystem 24% | Rewards 18%</text>
  <text x="556" y="374" fill="#2D2430" font-family="Arial, Helvetica, sans-serif" font-size="16">
    <tspan x="556" dy="0">The long-term map is still large enough</tspan>
    <tspan x="556" dy="21">to matter for future token pressure.</tspan>
  </text>

  <rect x="936" y="240" width="288" height="206" fill="#E7A0A4"/>
  <rect x="954" y="258" width="288" height="206" fill="#B3472F"/>
  <rect x="936" y="240" width="288" height="206" fill="#F7E9D7" stroke="#2D2430" stroke-width="3"/>
  <text x="968" y="282" fill="#8C2F39" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">MAX SUPPLY</text>
  <text x="968" y="326" fill="#2D2430" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700">10.0B H</text>
  <text x="968" y="374" fill="#2D2430" font-family="Arial, Helvetica, sans-serif" font-size="16">
    <tspan x="968" dy="0">Headline supply is large,</tspan>
    <tspan x="968" dy="21">so timing matters most.</tspan>
  </text>

  <rect x="108" y="492" width="1116" height="286" fill="#D98858"/>
  <rect x="126" y="510" width="1116" height="286" fill="#6B2B30"/>
  <rect x="108" y="492" width="1116" height="286" fill="#F7E9D7" stroke="#2D2430" stroke-width="3"/>
  <text x="142" y="536" fill="#2D2430" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700">AT A GLANCE</text>
  <text x="142" y="586" fill="#2D2430" font-family="Arial, Helvetica, sans-serif" font-size="18">
    <tspan x="142" dy="0">1. Humanity did not launch with the simplest insider-dump profile.</tspan>
    <tspan x="142" dy="34">2. That does not mean future supply becomes irrelevant.</tspan>
    <tspan x="142" dy="34">3. The long-term question is whether protocol usage matures before distribution weight grows.</tspan>
    <tspan x="142" dy="34">4. H is easiest to read as staged tokenomics, not instant scarcity.</tspan>
  </text>
  <text x="142" y="736" fill="#7D3A3E" font-family="Arial, Helvetica, sans-serif" font-size="17">
    <tspan x="142" dy="0">The strongest tokenomics insight is timing.</tspan>
    <tspan x="142" dy="22">Cleaner early unlocks do not remove the long-term supply map.</tspan>
  </text>

  <rect x="108" y="830" width="1116" height="76" fill="#E7A0A4"/>
  <rect x="124" y="846" width="1116" height="76" fill="#B3472F"/>
  <rect x="108" y="830" width="1116" height="76" fill="#F7E9D7" stroke="#2D2430" stroke-width="3"/>
  <text x="142" y="876" fill="#2D2430" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">READ</text>
  <text x="244" y="876" fill="#2D2430" font-family="Arial, Helvetica, sans-serif" font-size="17">Humanity’s tokenomics looked cleaner early on, but the protocol still carries a meaningful future supply map.</text>
</svg>
