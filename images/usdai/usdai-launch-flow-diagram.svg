<svg width="1400" height="360" viewBox="0 0 1400 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">USD.AI launch structure flow diagram</title>
  <desc id="desc">A step-by-step flow showing how the USD.AI CHIP launch moved from CoinList to pre-market trading, futures, DEX liquidity, spot listings, tight float, and volatile price discovery.</desc>
  <rect width="1400" height="360" rx="24" fill="#F5F1E8"/>
  <text x="80" y="62" fill="#1E293B" font-family="Georgia, 'Times New Roman', serif" font-size="30" font-weight="700">USD.AI Launch Structure</text>
  <text x="80" y="92" fill="#475569" font-family="Arial, Helvetica, sans-serif" font-size="18">How layered access and thin visible supply shaped the first repricing wave</text>

  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#94A3B8" flood-opacity="0.18"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0 0L12 6L0 12V0Z" fill="#64748B"/>
    </marker>
  </defs>

  <g filter="url(#shadow)">
    <rect x="80" y="138" width="155" height="96" rx="18" fill="#FFF8E7"/>
    <text x="157.5" y="173" text-anchor="middle" fill="#7C2D12" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">CoinList</text>
    <text x="157.5" y="198" text-anchor="middle" fill="#7C2D12" font-family="Arial, Helvetica, sans-serif" font-size="14">Public sale anchor</text>
    <text x="157.5" y="218" text-anchor="middle" fill="#7C2D12" font-family="Arial, Helvetica, sans-serif" font-size="14">$0.03 reference price</text>

    <rect x="270" y="138" width="155" height="96" rx="18" fill="#F2FCE7"/>
    <text x="347.5" y="173" text-anchor="middle" fill="#166534" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">Pre-Market</text>
    <text x="347.5" y="198" text-anchor="middle" fill="#166534" font-family="Arial, Helvetica, sans-serif" font-size="14">MEXC and BitMart</text>
    <text x="347.5" y="218" text-anchor="middle" fill="#166534" font-family="Arial, Helvetica, sans-serif" font-size="14">Early price framing</text>

    <rect x="460" y="138" width="155" height="96" rx="18" fill="#ECFEFF"/>
    <text x="537.5" y="173" text-anchor="middle" fill="#155E75" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">Futures</text>
    <text x="537.5" y="198" text-anchor="middle" fill="#155E75" font-family="Arial, Helvetica, sans-serif" font-size="14">BitMart leverage</text>
    <text x="537.5" y="218" text-anchor="middle" fill="#155E75" font-family="Arial, Helvetica, sans-serif" font-size="14">Before broad spot access</text>

    <rect x="650" y="138" width="155" height="96" rx="18" fill="#EFF6FF"/>
    <text x="727.5" y="173" text-anchor="middle" fill="#1D4ED8" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">DEX</text>
    <text x="727.5" y="198" text-anchor="middle" fill="#1D4ED8" font-family="Arial, Helvetica, sans-serif" font-size="14">Uniswap pair live</text>
    <text x="727.5" y="218" text-anchor="middle" fill="#1D4ED8" font-family="Arial, Helvetica, sans-serif" font-size="14">Liquidity still thin</text>

    <rect x="840" y="138" width="155" height="96" rx="18" fill="#FAF5FF"/>
    <text x="917.5" y="173" text-anchor="middle" fill="#7E22CE" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">Spot</text>
    <text x="917.5" y="198" text-anchor="middle" fill="#7E22CE" font-family="Arial, Helvetica, sans-serif" font-size="14">MEXC public trading</text>
    <text x="917.5" y="218" text-anchor="middle" fill="#7E22CE" font-family="Arial, Helvetica, sans-serif" font-size="14">Attention expands fast</text>

    <rect x="1030" y="138" width="155" height="96" rx="18" fill="#FFF1F2"/>
    <text x="1107.5" y="173" text-anchor="middle" fill="#BE123C" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">Tight Float</text>
    <text x="1107.5" y="198" text-anchor="middle" fill="#BE123C" font-family="Arial, Helvetica, sans-serif" font-size="14">Limited visible supply</text>
    <text x="1107.5" y="218" text-anchor="middle" fill="#BE123C" font-family="Arial, Helvetica, sans-serif" font-size="14">High sensitivity to demand</text>

    <rect x="1220" y="138" width="120" height="96" rx="18" fill="#1E293B"/>
    <text x="1280" y="173" text-anchor="middle" fill="#F8FAFC" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">Volatile</text>
    <text x="1280" y="198" text-anchor="middle" fill="#F8FAFC" font-family="Arial, Helvetica, sans-serif" font-size="14">Price discovery</text>
    <text x="1280" y="218" text-anchor="middle" fill="#F8FAFC" font-family="Arial, Helvetica, sans-serif" font-size="14">Fast repricing</text>
  </g>

  <line x1="235" y1="186" x2="270" y2="186" stroke="#64748B" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="425" y1="186" x2="460" y2="186" stroke="#64748B" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="615" y1="186" x2="650" y2="186" stroke="#64748B" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="805" y1="186" x2="840" y2="186" stroke="#64748B" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="995" y1="186" x2="1030" y2="186" stroke="#64748B" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="1185" y1="186" x2="1220" y2="186" stroke="#64748B" stroke-width="4" marker-end="url(#arrow)"/>

  <text x="80" y="290" fill="#475569" font-family="Arial, Helvetica, sans-serif" font-size="16">Reading guide: the launch became more explosive as each access layer opened before the market had a chance to absorb supply normally.</text>
  <text x="80" y="318" fill="#475569" font-family="Arial, Helvetica, sans-serif" font-size="16">That is why the move looked less like a normal listing and more like a compressed launch sequence hitting a narrow tradable float.</text>
</svg>
