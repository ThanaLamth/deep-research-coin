<svg width="1400" height="860" viewBox="0 0 1400 860" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Katana project snapshot capture</title>
  <desc id="desc">A visual summary of Katana's official project positioning, tokenomics messaging, staking system, and product catalysts.</desc>
  <rect width="1400" height="860" rx="28" fill="#F5F1E8"/>
  <text x="70" y="74" fill="#1E293B" font-family="Georgia, 'Times New Roman', serif" font-size="34" font-weight="700">What Katana Says It Is</text>
  <text x="70" y="108" fill="#475569" font-family="Arial, Helvetica, sans-serif" font-size="18">Official narrative, token mechanics, and product rollout summarized from Katana blog posts and docs</text>

  <rect x="70" y="150" width="380" height="210" rx="22" fill="#FFF7ED"/>
  <text x="98" y="192" fill="#9A3412" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700">DeFi-first chain</text>
  <text x="98" y="232" fill="#9A3412" font-family="Arial, Helvetica, sans-serif" font-size="18">Katana positions itself around</text>
  <text x="98" y="262" fill="#9A3412" font-family="Arial, Helvetica, sans-serif" font-size="18">productive TVL, chain-owned liquidity,</text>
  <text x="98" y="292" fill="#9A3412" font-family="Arial, Helvetica, sans-serif" font-size="18">VaultBridge, auUSD, and native perps.</text>

  <rect x="490" y="150" width="380" height="210" rx="22" fill="#ECFDF5"/>
  <text x="518" y="192" fill="#166534" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700">Community-first tokenomics</text>
  <text x="518" y="232" fill="#166534" font-family="Arial, Helvetica, sans-serif" font-size="18">Official tokenomics post says:</text>
  <text x="518" y="262" fill="#166534" font-family="Arial, Helvetica, sans-serif" font-size="18">no investors, no pre-sales,</text>
  <text x="518" y="292" fill="#166534" font-family="Arial, Helvetica, sans-serif" font-size="18">no preferential insider unlocks.</text>

  <rect x="910" y="150" width="380" height="210" rx="22" fill="#EFF6FF"/>
  <text x="938" y="192" fill="#1D4ED8" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700">10B supply framework</text>
  <text x="938" y="232" fill="#1D4ED8" font-family="Arial, Helvetica, sans-serif" font-size="18">Updated March 17, 2026:</text>
  <text x="938" y="262" fill="#1D4ED8" font-family="Arial, Helvetica, sans-serif" font-size="18">10B KAT minted, 70M for pre-deposit users,</text>
  <text x="938" y="292" fill="#1D4ED8" font-family="Arial, Helvetica, sans-serif" font-size="18">1B for core app incentives once mainnet is live.</text>

  <rect x="70" y="400" width="600" height="250" rx="22" fill="#FEF2F2"/>
  <text x="98" y="444" fill="#B91C1C" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700">Supply sink through staking</text>
  <text x="98" y="486" fill="#B91C1C" font-family="Arial, Helvetica, sans-serif" font-size="18">TGE article and pre-staking post position vKAT as the core lockup rail.</text>
  <text x="98" y="520" fill="#B91C1C" font-family="Arial, Helvetica, sans-serif" font-size="18">The first 350M KAT pre-staked were promised a 35% 60-day floor,</text>
  <text x="98" y="552" fill="#B91C1C" font-family="Arial, Helvetica, sans-serif" font-size="18">while the docs show steep stabilization-window exit fees:</text>
  <text x="98" y="588" fill="#B91C1C" font-family="Arial, Helvetica, sans-serif" font-size="18">Day 0-14: 80%, Day 15-30: 60%, Day 31-45: 45%, Day 46-60: 30%.</text>

  <rect x="710" y="400" width="580" height="250" rx="22" fill="#EEF2FF"/>
  <text x="738" y="444" fill="#4338CA" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700">Product expansion still matters</text>
  <text x="738" y="486" fill="#4338CA" font-family="Arial, Helvetica, sans-serif" font-size="18">Katana TGE went live on March 18, 2026.</text>
  <text x="738" y="520" fill="#4338CA" font-family="Arial, Helvetica, sans-serif" font-size="18">Katana Perps then launched as a native perps DEX.</text>
  <text x="738" y="552" fill="#4338CA" font-family="Arial, Helvetica, sans-serif" font-size="18">Season 1 of The Forge started on March 23, 2026.</text>
  <text x="738" y="584" fill="#4338CA" font-family="Arial, Helvetica, sans-serif" font-size="18">That keeps the market focused on ongoing participation, not only on one launch-day trade.</text>

  <text x="70" y="760" fill="#64748B" font-family="Arial, Helvetica, sans-serif" font-size="15">Sources used for this capture: Katana tokenomics post, TGE post, pre-staking post, perps launch post, and KAT unstake docs.</text>
</svg>
