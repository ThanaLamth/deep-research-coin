<svg width="1600" height="420" viewBox="0 0 1600 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Katana catalyst flow diagram</title>
  <desc id="desc">A flow diagram showing how Katana moved from tokenomics update to TGE, staking locks, perps launch, chain TVL growth, and sharp repricing.</desc>
  <rect width="1600" height="420" rx="28" fill="#F5F1E8"/>
  <text x="70" y="66" fill="#1E293B" font-family="Georgia, 'Times New Roman', serif" font-size="34" font-weight="700">Katana Repricing Flow</text>
  <text x="70" y="98" fill="#475569" font-family="Arial, Helvetica, sans-serif" font-size="18">The chain narrative, supply sink, and market-cap mismatch that helped drive the current KAT move</text>

  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0 0L12 6L0 12V0Z" fill="#64748B"/>
    </marker>
  </defs>

  <rect x="70" y="160" width="190" height="120" rx="22" fill="#FFF7ED"/>
  <text x="165" y="198" text-anchor="middle" fill="#9A3412" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">March 17</text>
  <text x="165" y="226" text-anchor="middle" fill="#9A3412" font-family="Arial, Helvetica, sans-serif" font-size="15">Tokenomics update</text>
  <text x="165" y="248" text-anchor="middle" fill="#9A3412" font-family="Arial, Helvetica, sans-serif" font-size="15">No investors / no presale</text>

  <rect x="295" y="160" width="190" height="120" rx="22" fill="#ECFDF5"/>
  <text x="390" y="198" text-anchor="middle" fill="#166534" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">March 18</text>
  <text x="390" y="226" text-anchor="middle" fill="#166534" font-family="Arial, Helvetica, sans-serif" font-size="15">TGE and transferability</text>
  <text x="390" y="248" text-anchor="middle" fill="#166534" font-family="Arial, Helvetica, sans-serif" font-size="15">KAT becomes tradeable</text>

  <rect x="520" y="160" width="190" height="120" rx="22" fill="#EFF6FF"/>
  <text x="615" y="198" text-anchor="middle" fill="#1D4ED8" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">vKAT Sink</text>
  <text x="615" y="226" text-anchor="middle" fill="#1D4ED8" font-family="Arial, Helvetica, sans-serif" font-size="15">Pre-stake + exit fees</text>
  <text x="615" y="248" text-anchor="middle" fill="#1D4ED8" font-family="Arial, Helvetica, sans-serif" font-size="15">Short-term sell pressure reduced</text>

  <rect x="745" y="160" width="190" height="120" rx="22" fill="#FEF2F2"/>
  <text x="840" y="198" text-anchor="middle" fill="#B91C1C" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">Perps + Forge</text>
  <text x="840" y="226" text-anchor="middle" fill="#B91C1C" font-family="Arial, Helvetica, sans-serif" font-size="15">Native perps DEX</text>
  <text x="840" y="248" text-anchor="middle" fill="#B91C1C" font-family="Arial, Helvetica, sans-serif" font-size="15">Points program from March 23</text>

  <rect x="970" y="160" width="220" height="120" rx="22" fill="#EEF2FF"/>
  <text x="1080" y="198" text-anchor="middle" fill="#4338CA" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">Chain > Token</text>
  <text x="1080" y="226" text-anchor="middle" fill="#4338CA" font-family="Arial, Helvetica, sans-serif" font-size="15">TVL about $243M</text>
  <text x="1080" y="248" text-anchor="middle" fill="#4338CA" font-family="Arial, Helvetica, sans-serif" font-size="15">KAT market cap about $37M</text>

  <rect x="1225" y="160" width="250" height="120" rx="22" fill="#1E293B"/>
  <text x="1350" y="198" text-anchor="middle" fill="#F8FAFC" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">Sharp Repricing</text>
  <text x="1350" y="226" text-anchor="middle" fill="#F8FAFC" font-family="Arial, Helvetica, sans-serif" font-size="15">Volume returns into a</text>
  <text x="1350" y="248" text-anchor="middle" fill="#F8FAFC" font-family="Arial, Helvetica, sans-serif" font-size="15">still-narrow tradable float</text>

  <line x1="260" y1="220" x2="295" y2="220" stroke="#64748B" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="485" y1="220" x2="520" y2="220" stroke="#64748B" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="710" y1="220" x2="745" y2="220" stroke="#64748B" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="935" y1="220" x2="970" y2="220" stroke="#64748B" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="1190" y1="220" x2="1225" y2="220" stroke="#64748B" stroke-width="4" marker-end="url(#arrow)"/>

  <text x="70" y="350" fill="#475569" font-family="Arial, Helvetica, sans-serif" font-size="16">This move does not appear to be driven by one fresh headline alone. It looks more like a delayed repricing where the chain narrative, supply lockup design, and market-cap mismatch all started to reinforce each other.</text>
</svg>
