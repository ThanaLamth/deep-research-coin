<svg width="1400" height="980" viewBox="0 0 1400 980" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Katana onchain structure capture</title>
  <desc id="desc">A visual summary of Katana token holder concentration, pool liquidity, and recent transfer behavior on April 24, 2026.</desc>
  <rect width="1400" height="980" rx="28" fill="#F5F1E8"/>
  <text x="70" y="74" fill="#1E293B" font-family="Georgia, 'Times New Roman', serif" font-size="34" font-weight="700">Katana Onchain Structure</text>
  <text x="70" y="108" fill="#475569" font-family="Arial, Helvetica, sans-serif" font-size="18">Holder concentration, liquidity rails, and recent transfer behavior from the Katana explorer and GeckoTerminal</text>

  <rect x="70" y="150" width="420" height="260" rx="22" fill="#FFF7ED"/>
  <text x="98" y="192" fill="#9A3412" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700">Holder concentration</text>
  <text x="98" y="236" fill="#9A3412" font-family="Arial, Helvetica, sans-serif" font-size="18">Top holder: 4.497B KAT</text>
  <text x="98" y="268" fill="#9A3412" font-family="Arial, Helvetica, sans-serif" font-size="18">Share of supply: 44.97%</text>
  <text x="98" y="300" fill="#9A3412" font-family="Arial, Helvetica, sans-serif" font-size="18">Top 10 holders: 70.63%</text>
  <text x="98" y="332" fill="#9A3412" font-family="Arial, Helvetica, sans-serif" font-size="18">Top 20 holders: 79.03%</text>
  <text x="98" y="364" fill="#9A3412" font-family="Arial, Helvetica, sans-serif" font-size="18">Top 50 holders: 82.43%</text>

  <rect x="520" y="150" width="380" height="260" rx="22" fill="#ECFDF5"/>
  <text x="548" y="192" fill="#166534" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700">Contract-controlled top end</text>
  <text x="548" y="236" fill="#166534" font-family="Arial, Helvetica, sans-serif" font-size="18">Top holder label: GnosisSafeProxy</text>
  <text x="548" y="268" fill="#166534" font-family="Arial, Helvetica, sans-serif" font-size="18">#4 and #9: ERC1967Proxy</text>
  <text x="548" y="300" fill="#166534" font-family="Arial, Helvetica, sans-serif" font-size="18">Contracts hold 56.71% of total supply</text>
  <text x="548" y="332" fill="#166534" font-family="Arial, Helvetica, sans-serif" font-size="18">inside the top 10 alone.</text>
  <text x="548" y="364" fill="#166534" font-family="Arial, Helvetica, sans-serif" font-size="18">That is not a broad retail holder map.</text>

  <rect x="930" y="150" width="400" height="260" rx="22" fill="#EFF6FF"/>
  <text x="958" y="192" fill="#1D4ED8" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700">Liquidity rails</text>
  <text x="958" y="236" fill="#1D4ED8" font-family="Arial, Helvetica, sans-serif" font-size="18">Top 3 pools combined reserve:</text>
  <text x="958" y="268" fill="#1D4ED8" font-family="Arial, Helvetica, sans-serif" font-size="18">$765.57K</text>
  <text x="958" y="300" fill="#1D4ED8" font-family="Arial, Helvetica, sans-serif" font-size="18">Top 3 pools combined 24h volume:</text>
  <text x="958" y="332" fill="#1D4ED8" font-family="Arial, Helvetica, sans-serif" font-size="18">$6.60M</text>
  <text x="958" y="364" fill="#1D4ED8" font-family="Arial, Helvetica, sans-serif" font-size="18">Main venue: KAT / vbUSDC 0.05% on Sushi V3 Katana</text>

  <rect x="70" y="460" width="1260" height="290" rx="22" fill="#FFFFFF"/>
  <text x="98" y="504" fill="#1E293B" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700">Recent transfer sample</text>
  <text x="98" y="548" fill="#334155" font-family="Arial, Helvetica, sans-serif" font-size="18">Sample used: 500 most recent KAT transfers pulled from the Katana explorer API on April 24, 2026.</text>
  <text x="98" y="582" fill="#334155" font-family="Arial, Helvetica, sans-serif" font-size="18">Unique addresses touched: 95</text>
  <text x="98" y="616" fill="#334155" font-family="Arial, Helvetica, sans-serif" font-size="18">Transfers involving the top 3 liquidity pools: 365 of 500, or 73.0%</text>
  <text x="98" y="650" fill="#334155" font-family="Arial, Helvetica, sans-serif" font-size="18">Zero-address mint or burn hits in the sampled window: 0</text>
  <text x="98" y="684" fill="#334155" font-family="Arial, Helvetica, sans-serif" font-size="18">Interpretation: current flow looks pool-driven and routing-heavy, not fresh-mint-driven.</text>

  <rect x="70" y="790" width="1260" height="110" rx="22" fill="#FEF3C7"/>
  <text x="98" y="836" fill="#92400E" font-family="Arial, Helvetica, sans-serif" font-size="18">Key read: KAT does not look broadly distributed onchain, but the recent tape also does not look like a simple treasury dump. The live market is being shaped by a narrow float, contract-heavy supply, and pool-centric trading activity.</text>

  <text x="70" y="940" fill="#64748B" font-family="Arial, Helvetica, sans-serif" font-size="15">Sources used for this capture: explorer.katanarpc.com API and api.geckoterminal.com. Metrics checked on April 24, 2026.</text>
</svg>
